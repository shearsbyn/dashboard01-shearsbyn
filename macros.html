<link rel="stylesheet" href="theme.css" />

<style>
  /* Calorie header */
  .calHead { display:flex; align-items:center; justify-content:space-between; gap: var(--space-4); flex-wrap:wrap; margin-bottom: var(--space-3); }
  .calMath { display:flex; align-items:center; gap: var(--space-5); flex-wrap:wrap; }
  .calCell { display:flex; flex-direction:column; gap:2px; }
  .calCell .n { font-family: var(--font-display); font-weight:600; font-size: var(--text-2xl); letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .calCell .l { font-family: var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color: var(--muted); }
  .calOp { font-family: var(--font-display); font-size: var(--text-xl); color: var(--muted); }
  .calCell.remain .n { color: var(--brand); }
  .calCell.remain.over .n { color: var(--neg); }
  .goalEdit { display:flex; align-items:center; gap:8px; }
  .goalEdit .fieldInput { width: 82px; }
  .bar { height: 8px; border-radius: var(--radius-pill); background: var(--track); overflow:hidden; margin-bottom: var(--space-4); }
  .barFill { height:100%; border-radius: var(--radius-pill); background: var(--brand); transition: width var(--duration) var(--ease-premium); }
  .barFill.over { background: var(--neg); }

  /* Macro progress rows */
  .macroRows { display:flex; flex-direction:column; gap: var(--space-3); margin-top: var(--space-2); }
  .macroRow { display:flex; flex-direction:column; gap:5px; }
  .macroRowHead { display:flex; align-items:center; justify-content:space-between; }
  .macroRowLabel { font-family: var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }
  .macroRowLabel.p { color: #46E0A8; }
  .macroRowLabel.c { color: #FBBF24; }
  .macroRowLabel.f { color: #FB7185; }
  .macroRowRight { display:flex; align-items:center; gap:6px; }
  .macroRowVal { font-family: var(--font-mono); font-size:12px; font-variant-numeric: tabular-nums; color: var(--muted-strong); }
  .macroGoalInput { width:56px; font-family: var(--font-mono); font-size:12px; text-align:center; padding:2px 6px; border-radius:6px; border:1px solid var(--border); background: var(--surface-2,var(--surface)); color: var(--text); }
  .macroGoalInput:focus { outline:none; border-color: var(--brand-line); }
  .macroBarWrap { height:6px; border-radius:999px; background: var(--track); overflow:hidden; }
  .macroBarFill { height:100%; border-radius:999px; transition: width 0.35s ease; }
  .macroBarFill.p  { background: #46E0A8; }
  .macroBarFill.c  { background: #FBBF24; }
  .macroBarFill.f  { background: #FB7185; }
  .macroBarFill.over { background: var(--neg); }
  .macroRowRemain { font-size:10px; color: var(--muted); text-align:right; }

  /* Search section */
  .sectionTitle { font-family: var(--font-display); font-weight:600; font-size: var(--text-lg); margin: var(--space-8) 0 0; }
  .modeSwitcher { display:flex; gap:6px; margin: var(--space-4) 0 var(--space-3); }
  .modeBtn { flex:1; padding: 8px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--muted-strong); font-family: inherit; font-size: 13px; font-weight:600; cursor:pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .modeBtn.active { background: var(--brand-soft); border-color: var(--brand-line); color: var(--brand); }

  .searchRow { display:flex; gap:8px; align-items:center; margin-bottom: var(--space-3); }
  .searchRow .fieldInput { flex:1; }
  .scanBtn { width:42px; height:42px; flex-shrink:0; border-radius: var(--radius-md); border:1px solid var(--border); background: var(--surface); color: var(--muted-strong); cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background 0.15s; }
  .scanBtn:hover { background: var(--surface-2); }
  .scanBtn svg { width:20px; height:20px; }

  .results { display:flex; flex-direction:column; gap:6px; }
  .foodRow { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); padding: 10px 12px; border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .foodRow .meta { font-family: var(--font-mono); font-size:11px; color: var(--muted); }
  .foodName { font-weight:600; font-size: var(--text-sm); }
  .foodBrand { font-size:11px; color: var(--muted); margin-bottom:2px; }
  .gramInput { width: 74px; }
  .empty { color: var(--muted); font-size: 13px; padding: var(--space-4) 0; }
  .offBadge { display:inline-block; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:1px 5px; border-radius:999px; background: var(--brand-soft); color: var(--brand); margin-left:6px; vertical-align: middle; }
  .loadingDots { display:inline-flex; gap:3px; padding: var(--space-3) 0; }
  .loadingDots span { width:6px; height:6px; border-radius:50%; background: var(--muted); animation: dot 1.2s infinite; }
  .loadingDots span:nth-child(2) { animation-delay:.2s; }
  .loadingDots span:nth-child(3) { animation-delay:.4s; }
  @keyframes dot { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* Camera overlay for barcode scan */
  .camOverlay { position:fixed; inset:0; background:#000; z-index:999; display:none; flex-direction:column; }
  .camOverlay.open { display:flex; }
  .camVideo { flex:1; width:100%; object-fit:cover; }
  .camFrame { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .camBox { width:240px; height:120px; border:2px solid var(--brand); border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.55); }
  .camHint { position:absolute; bottom:0; left:0; right:0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); text-align:center; }
  .camClose { padding:12px 28px; border-radius: var(--radius-pill); border:1px solid rgba(255,255,255,0.25); background:rgba(0,0,0,0.5); color:#fff; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }

  .logList { display:flex; flex-direction:column; gap:6px; margin-top: var(--space-3); }
  .logRow { display:flex; align-items:center; justify-content:space-between; gap: var(--space-3); padding: 10px 12px; border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .logRow .nums { font-family: var(--font-mono); font-size:11px; color: var(--muted-strong); }
  .xBtn { background:transparent; border:1px solid var(--border); color:var(--muted); width:26px; height:26px; border-radius:50%; cursor:pointer; flex-shrink:0; }
  .xBtn:hover { color: var(--neg); border-color: var(--neg-line); }
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell" id="app"></div>
</main>

<!-- Camera overlay for barcode scanning -->
<div class="camOverlay" id="camOverlay">
  <video class="camVideo" id="camVideo" autoplay playsinline muted></video>
  <div class="camFrame"><div class="camBox"></div></div>
  <div class="camHint"><button class="camClose" id="camClose">Cancel</button></div>
</div>

<script src="theme.js"></script>
<script>
/* ============================================================
 * Macros — daily food + macro tracker with OpenFoodFacts search.
 * ============================================================ */
const STORE_KEY = 'macros_standalone_v1';

/* Local fallback foods (values per 100g). */
const LOCAL_FOODS = [
  { name: 'Chicken breast',  cal: 165, p: 31,  c: 0,   f: 3.6 },
  { name: 'Beef mince (5%)', cal: 137, p: 21,  c: 0,   f: 5   },
  { name: 'Salmon',          cal: 208, p: 20,  c: 0,   f: 13  },
  { name: 'Egg',             cal: 143, p: 13,  c: 1.1, f: 9.5 },
  { name: 'Greek yogurt',    cal: 59,  p: 10,  c: 3.6, f: 0.4 },
  { name: 'Whey protein',    cal: 400, p: 80,  c: 8,   f: 6   },
  { name: 'White rice',      cal: 130, p: 2.7, c: 28,  f: 0.3 },
  { name: 'Oats',            cal: 389, p: 17,  c: 66,  f: 7   },
  { name: 'Pasta (cooked)',  cal: 157, p: 6,   c: 31,  f: 0.9 },
  { name: 'Potato',          cal: 77,  p: 2,   c: 17,  f: 0.1 },
  { name: 'Sweet potato',    cal: 86,  p: 1.6, c: 20,  f: 0.1 },
  { name: 'Banana',          cal: 89,  p: 1.1, c: 23,  f: 0.3 },
  { name: 'Apple',           cal: 52,  p: 0.3, c: 14,  f: 0.2 },
  { name: 'Broccoli',        cal: 34,  p: 2.8, c: 7,   f: 0.4 },
  { name: 'Almonds',         cal: 579, p: 21,  c: 22,  f: 50  },
  { name: 'Peanut butter',   cal: 588, p: 25,  c: 20,  f: 50  },
  { name: 'Olive oil',       cal: 884, p: 0,   c: 0,   f: 100 },
  { name: 'Avocado',         cal: 160, p: 2,   c: 9,   f: 15  },
  { name: 'Cheddar cheese',  cal: 402, p: 25,  c: 1.3, f: 33  },
  { name: 'Milk (whole)',    cal: 61,  p: 3.2, c: 4.8, f: 3.3 },
  { name: 'Bread (slice)',   cal: 265, p: 9,   c: 49,  f: 3.2 },
  { name: 'Tuna (canned)',   cal: 116, p: 26,  c: 0,   f: 1   },
];

/* ---- storage ---- */
function todayKey(){ const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function loadAll(){ try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : {}; } catch(e){ return {}; } }
function saveAll(o){ try { localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch(e){} }
let store = loadAll();
function todaysLog(){ return store[todayKey()] || []; }
function setTodaysLog(list){ store[todayKey()] = list; saveAll(store); }
function goalCal(){ return store.goalCal != null ? store.goalCal : 2000; }
function setGoalCal(n){ store.goalCal = n; saveAll(store); }
function goalP(){ return store.goalP != null ? store.goalP : 100; }
function setGoalP(n){ store.goalP = n; saveAll(store); }
function goalC(){ return store.goalC != null ? store.goalC : 275; }
function setGoalC(n){ store.goalC = n; saveAll(store); }
function goalF(){ return store.goalF != null ? store.goalF : 70; }
function setGoalF(n){ store.goalF = n; saveAll(store); }

function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function round(n){ return Math.round(n * 10) / 10; }
function r1(n){ return isFinite(n) ? Math.round(n * 10) / 10 : 0; }

/* ---- search state ---- */
let searchMode  = 'text';   // 'text' | 'barcode'
let textQuery   = '';
let barcodeQuery = '';
let pendingMatches = [];    // {name, brand, cal, p, c, f, fromOFF} — populated after fetch
let searchLoading = false;
let searchDebounce = null;

/* ---- OpenFoodFacts helpers ---- */
function offNutriments(n) {
  const cal = r1(n['energy-kcal_100g'] || (n['energy_100g'] || 0) / 4.184);
  return { cal, p: r1(n['proteins_100g'] || 0), c: r1(n['carbohydrates_100g'] || 0), f: r1(n['fat_100g'] || 0) };
}

async function searchOFF(q) {
  const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='
    + encodeURIComponent(q)
    + '&json=1&action=process&fields=product_name,nutriments,brands,code&page_size=8';
  const res = await fetch(url);
  if (!res.ok) throw new Error('OFF ' + res.status);
  const data = await res.json();
  return (data.products || [])
    .filter(p => p.product_name && p.nutriments && p.nutriments['energy-kcal_100g'] != null)
    .map(p => ({ name: p.product_name, brand: p.brands || '', ...offNutriments(p.nutriments), fromOFF: true }));
}

async function lookupBarcode(code) {
  const url = 'https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code)
    + '.json?fields=product_name,nutriments,brands';
  const res = await fetch(url);
  if (!res.ok) throw new Error('OFF ' + res.status);
  const data = await res.json();
  if (data.status !== 1 || !data.product) return null;
  const p = data.product;
  if (!p.nutriments || p.nutriments['energy-kcal_100g'] == null) return null;
  return { name: p.product_name || 'Unknown product', brand: p.brands || '', ...offNutriments(p.nutriments), fromOFF: true };
}

async function runSearch() {
  const q = textQuery.trim();
  if (!q) { pendingMatches = []; renderResults(); return; }

  // Local matches first (instant)
  pendingMatches = LOCAL_FOODS.filter(f => f.name.toLowerCase().includes(q.toLowerCase())).slice(0, 4);
  renderResults();

  // Then fetch OFF
  searchLoading = true;
  renderResults();
  try {
    const off = await searchOFF(q);
    // Deduplicate: remove local entries that have an OFF match with the same name
    const offNames = new Set(off.map(f => f.name.toLowerCase()));
    pendingMatches = pendingMatches.filter(f => !offNames.has(f.name.toLowerCase())).concat(off);
  } catch (_) { /* keep local results */ }
  searchLoading = false;
  renderResults();
}

async function runBarcodeSearch() {
  const code = barcodeQuery.trim();
  if (!code) { pendingMatches = []; renderResults(); return; }
  searchLoading = true;
  renderResults();
  try {
    const result = await lookupBarcode(code);
    pendingMatches = result ? [result] : [];
  } catch (_) { pendingMatches = []; }
  searchLoading = false;
  renderResults();
}

/* ---- render ---- */
function totals(){
  return todaysLog().reduce((t,e) => { t.cal+=e.cal; t.p+=e.p; t.c+=e.c; t.f+=e.f; return t; }, {cal:0,p:0,c:0,f:0});
}

function summaryHtml(){
  const t = totals();
  const gcal = goalCal(), gp = goalP(), gc = goalC(), gf = goalF();
  const remCal = gcal - t.cal;
  const overCal = remCal < 0;
  const pctCal = Math.min(100, gcal > 0 ? (t.cal / gcal) * 100 : 0);
  const cell = (cls,n,l) => '<div class="calCell ' + cls + '"><span class="n">' + Math.round(n) + '</span><span class="l">' + l + '</span></div>';

  function macroRow(cls, label, consumed, target, goalId) {
    const pct  = Math.min(100, target > 0 ? (consumed / target) * 100 : 0);
    const rem  = Math.round(target - consumed);
    const over = rem < 0;
    return '<div class="macroRow">'
      + '<div class="macroRowHead">'
      + '<span class="macroRowLabel ' + cls + '">' + label + '</span>'
      + '<div class="macroRowRight">'
      + '<span class="macroRowVal">' + Math.round(consumed) + 'g</span>'
      + '<span class="macroRowVal" style="color:var(--muted)">/</span>'
      + '<input class="macroGoalInput" id="' + goalId + '" type="number" min="0" step="1" value="' + target + '" title="Daily target" />g'
      + '</div></div>'
      + '<div class="macroBarWrap"><div class="macroBarFill ' + cls + (over?' over':'') + '" style="width:' + pct + '%"></div></div>'
      + '<div class="macroRowRemain">' + (over ? Math.abs(rem) + 'g over' : rem + 'g remaining') + '</div>'
      + '</div>';
  }

  return '<section class="card"><span class="cardName">Today</span>'
    + '<div class="calHead"><div class="calMath">'
    + cell('', gcal, 'goal') + '<span class="calOp">−</span>'
    + cell('', t.cal, 'eaten') + '<span class="calOp">=</span>'
    + cell('remain' + (overCal?' over':''), Math.abs(remCal), overCal?'over':'left')
    + '</div><div class="goalEdit"><span class="calCell"><span class="l">kcal goal</span></span>'
    + '<input class="fieldInput" id="goalCal" type="number" min="0" step="50" value="' + gcal + '" /></div></div>'
    + '<div class="bar"><div class="barFill' + (overCal?' over':'') + '" style="width:' + pctCal + '%"></div></div>'
    + '<div class="macroRows">'
    + macroRow('p', 'Protein', t.p, gp, 'goalP')
    + macroRow('c', 'Carbs',   t.c, gc, 'goalC')
    + macroRow('f', 'Fat',     t.f, gf, 'goalF')
    + '</div></section>';
}

const hasBarcodeDetector = typeof BarcodeDetector !== 'undefined';

function searchHtml(){
  const scanBtnHtml = hasBarcodeDetector
    ? '<button class="scanBtn" id="scanBtn" title="Scan barcode with camera" aria-label="Scan">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V5a2 2 0 0 1 2-2h4"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M21 15v4a2 2 0 0 1-2 2h-4"/><path d="M9 21H5a2 2 0 0 1-2-2v-4"/><line x1="7" y1="8" x2="7" y2="16"/><line x1="10" y1="8" x2="10" y2="16"/><line x1="14" y1="8" x2="14" y2="16"/><line x1="17" y1="8" x2="17" y2="16"/></svg>'
      + '</button>'
    : '';

  const textBlock = '<div class="searchRow">'
    + '<input class="fieldInput" id="q" type="text" placeholder="Search foods…" value="' + esc(textQuery) + '" autocomplete="off" autocorrect="off" />'
    + '</div>';

  const barcodeBlock = '<div class="searchRow">'
    + '<input class="fieldInput" id="barcodeInput" type="text" inputmode="numeric" placeholder="Type or paste barcode number…" value="' + esc(barcodeQuery) + '" autocomplete="off" />'
    + scanBtnHtml
    + '</div>';

  return '<h2 class="sectionTitle">Add food</h2>'
    + '<div class="modeSwitcher">'
    + '<button class="modeBtn' + (searchMode==='text'?' active':'') + '" data-mode="text">🔍 Search</button>'
    + '<button class="modeBtn' + (searchMode==='barcode'?' active':'') + '" data-mode="barcode">📷 Barcode</button>'
    + '</div>'
    + (searchMode === 'text' ? textBlock : barcodeBlock)
    + '<div class="results" id="results"></div>';
}

function foodCardHtml(f, i) {
  const badge = f.fromOFF ? '<span class="offBadge">OFF</span>' : '';
  const brandLine = f.brand ? '<div class="foodBrand">' + esc(f.brand) + '</div>' : '';
  return '<div class="foodRow">'
    + '<div><div class="foodName">' + esc(f.name) + badge + '</div>'
    + brandLine
    + '<div class="meta">' + round(f.cal) + ' kcal · ' + round(f.p) + 'P / ' + round(f.c) + 'C / ' + round(f.f) + 'F per 100g</div></div>'
    + '<div style="display:flex;align-items:center;gap:8px;">'
    + '<input class="fieldInput gramInput" type="number" min="0" placeholder="g" data-grams="' + i + '" />'
    + '<button class="btn btn-primary" data-add="' + i + '">Add</button></div></div>';
}

function renderResults() {
  const el = document.getElementById('results');
  if (!el) return;

  if (searchMode === 'text') {
    const q = textQuery.trim();
    if (!q) { el.innerHTML = '<p class="empty">Start typing to search millions of foods…</p>'; return; }
    if (!pendingMatches.length && searchLoading) {
      el.innerHTML = '<div class="loadingDots"><span></span><span></span><span></span></div>';
      return;
    }
    if (!pendingMatches.length) { el.innerHTML = '<p class="empty">No results found.</p>'; return; }
    let html = pendingMatches.map(foodCardHtml).join('');
    if (searchLoading) html = '<div class="loadingDots"><span></span><span></span><span></span></div>' + html;
    el.innerHTML = html;
  } else {
    const code = barcodeQuery.trim();
    if (!code) { el.innerHTML = '<p class="empty">Enter a barcode number or tap the scanner icon.</p>'; return; }
    if (searchLoading) { el.innerHTML = '<div class="loadingDots"><span></span><span></span><span></span></div>'; return; }
    if (!pendingMatches.length) { el.innerHTML = '<p class="empty">Barcode not found in OpenFoodFacts.</p>'; return; }
    el.innerHTML = pendingMatches.map(foodCardHtml).join('');
  }
}

function logHtml(){
  const log = todaysLog();
  if (!log.length) return '<h2 class="sectionTitle">Logged today</h2><p class="empty">Nothing logged yet.</p>';
  const rows = log.map((e,i) =>
    '<div class="logRow"><div><div class="foodName">' + esc(e.name) + ' <span style="color:var(--muted);font-size:12px">' + e.grams + 'g</span></div>'
    + '<div class="nums">' + round(e.cal) + ' kcal · ' + round(e.p) + 'P / ' + round(e.c) + 'C / ' + round(e.f) + 'F</div></div>'
    + '<button class="xBtn" data-del="' + i + '" title="Remove">×</button></div>').join('');
  return '<h2 class="sectionTitle">Logged today</h2><div class="logList">' + rows + '</div>';
}

function headerHtml(){
  return '<header class="header"><div><h1 class="title">Macros</h1><p class="subtitle">protein · carbs · fat</p></div>'
    + '<div class="headerControls"><a class="backLink" href="index.html">← Dashboard</a><span id="themeSeg"></span></div></header>';
}

function render(){
  document.getElementById('app').innerHTML = headerHtml() + summaryHtml() + searchHtml() + logHtml();
  document.getElementById('themeSeg').innerHTML = Patron.switcherHtml();
  renderResults();
}

/* ---- events ---- */
document.addEventListener('input', e => {
  if (e.target.id === 'q') {
    textQuery = e.target.value;
    pendingMatches = [];
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(runSearch, 350);
    renderResults();
  }
  if (e.target.id === 'barcodeInput') {
    barcodeQuery = e.target.value;
    pendingMatches = [];
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(runBarcodeSearch, 500);
    renderResults();
  }
  if (e.target.id === 'goalCal') {
    const n = Number(e.target.value);
    setGoalCal(isFinite(n) && n >= 0 ? n : 0);
    render(); document.getElementById('goalCal').focus();
  }
  if (e.target.id === 'goalP') {
    const n = Number(e.target.value);
    setGoalP(isFinite(n) && n >= 0 ? n : 0);
    render(); document.getElementById('goalP').focus();
  }
  if (e.target.id === 'goalC') {
    const n = Number(e.target.value);
    setGoalC(isFinite(n) && n >= 0 ? n : 0);
    render(); document.getElementById('goalC').focus();
  }
  if (e.target.id === 'goalF') {
    const n = Number(e.target.value);
    setGoalF(isFinite(n) && n >= 0 ? n : 0);
    render(); document.getElementById('goalF').focus();
  }
});

document.addEventListener('click', e => {
  // Mode switcher
  const modeBtn = e.target.closest('[data-mode]');
  if (modeBtn) {
    searchMode = modeBtn.dataset.mode;
    pendingMatches = [];
    render();
    const inputId = searchMode === 'text' ? 'q' : 'barcodeInput';
    setTimeout(() => { const el = document.getElementById(inputId); if (el) el.focus(); }, 60);
    return;
  }

  // Barcode camera scan
  if (e.target.closest('#scanBtn')) { openCamera(); return; }
  if (e.target.closest('#camClose')) { closeCamera(); return; }

  // Add food
  const add = e.target.closest('[data-add]');
  if (add) {
    const idx = Number(add.getAttribute('data-add'));
    const f = pendingMatches[idx];
    const gramsEl = document.querySelector('[data-grams="' + idx + '"]');
    const grams = Number(gramsEl && gramsEl.value);
    if (!f || !isFinite(grams) || grams <= 0) { alert('Enter how many grams.'); return; }
    const k = grams / 100;
    const log = todaysLog();
    log.push({ name: f.name, grams, cal: r1(f.cal*k), p: r1(f.p*k), c: r1(f.c*k), f: r1(f.f*k) });
    setTodaysLog(log);
    pendingMatches = []; textQuery = ''; barcodeQuery = '';
    render();
    return;
  }

  // Remove logged item
  const del = e.target.closest('[data-del]');
  if (del) {
    const log = todaysLog();
    log.splice(Number(del.getAttribute('data-del')), 1);
    setTodaysLog(log);
    render();
    return;
  }
});

/* ---- barcode camera scan ---- */
let camStream = null;
let camInterval = null;

async function openCamera() {
  const overlay = document.getElementById('camOverlay');
  const video   = document.getElementById('camVideo');
  overlay.classList.add('open');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = camStream;
    await video.play();
    const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code'] });
    camInterval = setInterval(async () => {
      try {
        const codes = await detector.detect(video);
        if (codes.length) {
          const raw = codes[0].rawValue;
          closeCamera();
          barcodeQuery = raw;
          render();
          runBarcodeSearch();
        }
      } catch (_) {}
    }, 300);
  } catch (err) {
    closeCamera();
    alert('Camera access denied or not available. Enter the barcode number manually.');
  }
}

function closeCamera() {
  clearInterval(camInterval); camInterval = null;
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('camOverlay').classList.remove('open');
  document.getElementById('camVideo').srcObject = null;
}

window.addEventListener('storage', e => { if (e.key === STORE_KEY) { store = loadAll(); render(); } });
render();
</script>
