.checkBtn:hover { border-color: var(--brand); }

/* ============================================================
 * RECOMMENDER — ported from signals.ts
 * ============================================================ */
function extractSignals(u) {
  const sig = [];
  if (u.caffeineMgPerDay > 400) sig.push('very-high-caffeine');
  else if (u.caffeineMgPerDay > 200) sig.push('high-caffeine');
  if (u.hasStims) sig.push('has-stims');
  if (u.hasNicotine) sig.push('has-nicotine');
  if (u.hasAlcohol) sig.push('has-alcohol');
  if (u.gymLevel === 'beginner') sig.push('beginner-training');
  else if (u.gymLevel === 'intermediate' || u.gymLevel === 'advanced') sig.push('heavy-training');
  if (u.goal === 'bulk') sig.push('bulk-goal');
  else if (u.goal === 'cut') sig.push('cut-goal');
  else if (u.goal === 'recomp') sig.push('recomp-goal');
  else if (u.goal === 'general_health') sig.push('general-health-goal');
  if (u.sex === 'M') sig.push('male');
  else if (u.sex === 'F') sig.push('female');
  if (u.age !== null && u.age !== undefined) {
    if (u.age >= 50) sig.push('senior');
    else if (u.age >= 40) sig.push('aging');
  }
  // Recovery + sleep metrics (manual, or auto-filled from Whoop) drive these.
  if (u.recovery != null && u.recovery < 50) sig.push('low-recovery');
  if (u.sleep === 'poor') sig.push('poor-sleep');
  return sig;
}
function scoreSupplement(s, activeSignals) {
  let score = s.baseScore;
  for (const sig of activeSignals) {
    const boost = s.signalBoosts[sig];
    if (typeof boost === 'number') score += boost;
  }
  return Math.max(1, Math.min(10, score));
}
function reasonsFor(s, activeSignals) {
  return activeSignals.filter(sig => (s.signalBoosts[sig] || 0) > 0);
}
function recommend(user, options) {
  options = options || {};
  const limit = options.limit || 8;
  const minScore = options.minScore || 5;
  const signals = extractSignals(user);
  const scored = SUPPLEMENT_DB
    .filter(s => !user.alreadyTakingIds.has(s.id))
    .map(s => ({ supplement: s, score: scoreSupplement(s, signals), reasons: reasonsFor(s, signals) }))
    .filter(r => r.score >= minScore)
    .sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      if (b.supplement.baseScore !== a.supplement.baseScore) return b.supplement.baseScore - a.supplement.baseScore;
      return a.supplement.id.localeCompare(b.supplement.id);
    })
    .slice(0, limit);
  return { signals, recommendations: scored };
}
function packToBudget(recs, budget) {
  let running = 0;
  const inBudget = [];
  const all = recs.map(rec => {
    const next = running + rec.supplement.priceUsdMonthly;
    const fits = next <= budget;
    if (fits) { running = next; inBudget.push(rec); }
    return { rec, fits };
  });
  return { all, inBudget };
}
function buyUrlFor(s) {
  if (s.buyUrl) return s.buyUrl;
  const primaryBrand = (s.brand || '').split(/\s+or\s+/i)[0].trim();
  const query = (primaryBrand + ' ' + s.name).trim();
  return 'https://www.amazon.com/s?k=' + encodeURIComponent(query);
}

function whoopSleepQuality(d) {

  if (d.sleepPerf != null) return d.sleepPerf >= 85 ? 'good' : d.sleepPerf >= 70 ? 'fair' : 'poor';
  if (d.sleepHours != null && d.sleepTargetHours) { const r = d.sleepHours / d.sleepTargetHours; return r >= 0.95 ? 'good' : r >= 0.85 ? 'fair' : 'poor'; }
  return '';
}
function whoopAgo(ts) { if (!ts) return ''; const m = Math.max(0, Math.round((Date.now() - ts) / 60000)); if (m < 1) return 'just now'; if (m < 60) return m + 'm ago'; return Math.round(m / 60) + 'h ago'; }

function addItem(input) {
  const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);

  if (!name) return;
  state.items.push({

    dose: (input.dose || '').trim(),
    window: input.window,
    note: (input.note || '').trim(),
    sourceId: input.sourceId != null ? input.sourceId : null,
    ordered: input.ordered != null ? input.ordered : true,
  });
  saveState(); render();
}
function removeItem(id) {
  state.items = state.items.filter(i => i.id !== id);
  state.low = state.low.filter(x => x !== id);
  for (const k of Object.keys(state.taken)) {
    if (state.taken[k][id]) { delete state.taken[k][id]; }
  }
  saveState(); render();
}
function toggleTaken(id) {
  const key = dateKey();
  const day = Object.assign({}, state.taken[key] || {});
  if (day[id]) delete day[id]; else day[id] = Date.now();
  state.taken[key] = day;
  saveState(); render();
}
function toggleLow(id) {
  if (state.low.includes(id)) state.low = state.low.filter(x => x !== id);
  else state.low.push(id);
  saveState(); render();
}

function search(rawQuery) {
  const q = (rawQuery || '').toLowerCase().trim();
  if (!q) return [];
  const starts = [], contains = [];
  for (const s of SUPPLEMENT_DB) {
    const haystack = [s.name.toLowerCase()].concat(s.aliases.map(a => a.toLowerCase()));
    if (haystack.some(h => h.startsWith(q))) starts.push(s);
    else if (haystack.some(h => h.includes(q))) contains.push(s);
  }
  return starts.concat(contains).slice(0, 6);
}
function lookupDb(sourceId) {
  if (!sourceId) return null;
  return SUPPLEMENT_DB.find(s => s.id === sourceId) || null;
}
function windowMeta(key) { return WINDOWS.find(w => w.key === key); }
function windowLabel(key) { const w = windowMeta(key); return w ? (w.icon + ' ' + w.title.toLowerCase()) : key; }

  const d = new Date();
  const dayLabel = DOW[d.getDay()] + ', ' + MON[d.getMonth()] + ' ' + d.getDate();
  return ''
    + '<header class="header"><div class="headerLeft">'
    +   '<a class="back" href="index.html"><span class="backArrow">←</span> Rowan</a>'
    +   '<span class="dayPill">' + dayLabel + '</span>'
    +   '<h1 class="title">Supplements</h1>'
    +   '<p class="subtitle">Daily stack · resets at 6 AM</p>'
    + '</div>'
    + '<div class="headerRight"><div class="themeSeg" role="radiogroup" aria-label="Theme">'
    +   THEMES.map(t => '<button type="button" class="themeBtn ' + (t.key === currentTheme ? 'themeBtnActive' : '') + '" data-action="theme" data-theme="' + t.key + '"><span class="themeSwatch" style="background:' + t.swatch + '"></span>' + t.label + '</button>').join('')
    + '</div></div></header>';
}

/* ---- Hero ---- */
function heroHtml() {
  const taken = takenCount(), total = totalCount();
  const missedCount = missedItems().length;
  const lowCount = state.low.length;
  const pct = total === 0 ? 0 : Math.min(100, (taken / total) * 100);
  const hitAll = total > 0 && taken >= total;
  let helper, helperGood = false;
  if (total === 0) helper = 'Add a few supplements below to start your stack.';
  else if (taken === 0) helper = 'Nothing logged yet today.';
  else if (hitAll) { helper = 'Stack complete for today.'; helperGood = true; }
  else helper = (total - taken) + ' left to take today.';

  let flags = '';
  if (missedCount > 0 || lowCount > 0) {
    flags = '<div class="heroFlags">'
      + (missedCount > 0 ? '<span class="flagPill flagMissed">' + missedCount + ' missed</span>' : '')
      + (lowCount > 0 ? '<span class="flagPill flagLow">' + lowCount + ' running low</span>' : '')
      + '</div>';
  }
  return ''
    + '<section class="heroCard">'
    +   '<span class="heroEyebrow"><span class="heroEyebrowMark">·01</span><span class="heroEyebrowRule"></span>Today</span>'
    +   '<div class="heroNumWrap"><span class="heroNum">' + taken + '</span><span class="heroNumSlash"> / </span><span class="heroNumTotal">' + (total || '—') + '</span></div>'
    +   '<div class="progressTrack" aria-hidden><div class="progressFill ' + (hitAll ? 'progressFillDone' : '') + '" style="width:' + pct + '%"></div></div>'
    +   '<p class="helper ' + (helperGood ? 'helperGood' : '') + '">' + esc(helper) + '</p>'
    +   flags
    + '</section>';
}

/* ---- Stack list ---- */
function stackHtml() {
  if (state.items.length === 0) {
    return '<section class="emptyCard"><p class="emptyText">Your stack is empty. Add your first supplement below. Search any name and we’ll pre-fill the dose + timing.</p></section>';
  }
  const tt = todayTaken();
  const now = new Date();
  const hour = now.getHours() + now.getMinutes() / 60;
  let html = '<section class="stackList">';
  for (const win of WINDOWS) {
    const winItems = state.items.filter(i => (i.window || 'anytime') === win.key);
    if (winItems.length === 0) continue;
    const isPastCutoff = win.cutoffHour !== null && hour > win.cutoffHour;
    html += '<div class="windowGroup">'
      + '<header class="windowHead"><span class="windowIcon" aria-hidden>' + win.icon + '</span><span class="windowTitle">' + esc(win.title) + '</span><span class="windowTime">' + esc(win.time) + '</span></header>'
      + '<ul class="windowItems">';
    for (const item of winItems) {
      const dbRow = lookupDb(item.sourceId);
      const isTaken = !!tt[item.id];
      const isLow = state.low.includes(item.id);
      const isMissed = isPastCutoff && !isTaken;
      const meta = [item.dose, item.note].filter(Boolean).join(' · ');
      const rowClasses = ['itemRow', isTaken ? 'itemRowTaken' : '', (isMissed && !isTaken) ? 'itemRowMissed' : ''].filter(Boolean).join(' ');
      const infoOpen = ui.stackInfoFor === item.id;
      html += '<li class="' + rowClasses + '">'
        + '<div class="itemRowMain">'
        +   '<span class="itemIcon" aria-hidden>' + item.icon + '</span>'
        +   '<div class="itemBody"><div class="itemNameRow"><span class="itemName">' + esc(item.name) + '</span>'
        +     (dbRow ? '<button type="button" class="infoBtnInline" data-action="stack-info" data-id="' + esc(item.id) + '" aria-pressed="' + infoOpen + '" title="What it does, when, how">i</button>' : '')
        +   '</div>' + (meta ? '<div class="itemMeta">' + esc(meta) + '</div>' : '') + '</div>'
        +   '<div class="itemQuietActions">'
        +     '<button type="button" class="lowBtn ' + (isLow ? 'lowBtnOn' : '') + '" data-action="toggle-low" data-id="' + esc(item.id) + '" aria-pressed="' + isLow + '" title="' + (isLow ? 'Clear running-low flag' : 'Flag as running low') + '">' + (isLow ? '⚠' : '↓') + '</button>'
        +     '<button type="button" class="delBtn" data-action="remove" data-id="' + esc(item.id) + '" title="Remove">×</button>'
        +   '</div>'
        +   '<button type="button" class="checkBtn ' + (isTaken ? 'checkBtnOn' : '') + '" data-action="toggle-taken" data-id="' + esc(item.id) + '" aria-pressed="' + isTaken + '">' + (isTaken ? '✓' : '') + '</button>'
        + '</div>'
        + (infoOpen && dbRow ? '<div class="itemInfoSlot">' + infoPopoverHtml(dbRow, { hideAdd: true }) + '</div>' : '')
        + '</li>';
    }
    html += '</ul></div>';
  }
  html += '</section>';
  return html;
}

/* ---- Add form ---- */
function addFormHtml() {
  const matches = search(ui.name);
  const showResults = ui.searchOpen && matches.length > 0 && !ui.infoForId;
  let dropdown = '';
  if (showResults) {
    dropdown = '<ul class="searchResults" role="listbox">';
    matches.forEach((s, i) => {
      dropdown += '<li class="searchResultLi">'
        + '<button type="button" role="option" aria-selected="' + (i === ui.focusIdx) + '" class="searchResult ' + (i === ui.focusIdx ? 'searchResultFocus' : '') + '" data-action="pick" data-id="' + esc(s.id) + '">'
        +   '<span class="searchResultIcon" aria-hidden>' + s.icon + '</span>'
        +   '<span class="searchResultBody"><span class="searchResultName">' + esc(s.name) + '</span><span class="searchResultMeta">' + esc(s.dose + ' · ' + windowLabel(s.window)) + '</span></span>'
        + '</button>'
        + '<button type="button" class="infoBtn" data-action="search-info" data-id="' + esc(s.id) + '" title="What it does, when, how">i</button>'
        + '</li>';
    });
    dropdown += '</ul>';
  }
  let pinnedInfo = '';
  if (ui.infoForId) {
    const s = lookupDb(ui.infoForId);
    if (s) pinnedInfo = infoPopoverHtml(s, { hideAdd: false });
  }
  let hint = '';
  if (ui.name.trim()) {
    const w = windowMeta(ui.windowKey);
    hint = '<p class="addHint">' + (ui.dose ? esc(ui.dose) + ' · ' : '') + (w ? w.icon + ' ' + esc(w.title.toLowerCase()) : '') + (ui.sourceId ? ' · from library' : ' · custom entry') + '</p>';
  }
  const opts = WINDOWS.map(w => '<option value="' + w.key + '"' + (w.key === ui.windowKey ? ' selected' : '') + '>' + esc(w.title) + '</option>').join('');
  return ''
    + '<section class="addCard">'
    +   '<span class="heroEyebrow"><span class="heroEyebrowMark">·02</span><span class="heroEyebrowRule"></span>Add to stack</span>'
    +   '<form class="addForm" id="addForm" autocomplete="off">'
    +     '<div class="addNameWrap" id="addNameWrap">'
    +       '<label class="addLabel" for="supplement-search-input">Search</label>'
    +       '<input id="supplement-search-input" type="text" class="addInput addSearchInput" placeholder="Type a name: Creatine, Vitamin D, magnesium…" value="' + esc(ui.name) + '" spellcheck="false" autocomplete="off" />'
    +       dropdown
    +       pinnedInfo
    +     '</div>'
    +     '<div class="addRowTwo">'
    +       '<div class="addField"><label class="addLabel" for="supplement-dose-input">Dose</label><input id="supplement-dose-input" type="text" class="addInput" placeholder="5 g" value="' + esc(ui.dose) + '" /></div>'
    +       '<div class="addField"><label class="addLabel" for="supplement-window-input">When</label><select id="supplement-window-input" class="addInput addSelect">' + opts + '</select></div>'
    +       '<button type="submit" class="addBtn" ' + (ui.name.trim() ? '' : 'disabled') + '><span class="addBtnPlus" aria-hidden>+</span>Add to stack</button>'
    +     '</div>'
    +   '</form>'
    +   hint
    + '</section>';
}

/* ---- Recommendations ---- */
function buildTickerItems(signals, caffeine) {
  const items = [];
  if (caffeine > 0) items.push({ tone: caffeine > 400 ? 'urgent' : 'mild', text: 'Caffeine ' + caffeine + 'mg/day' });
  if (signals.indexOf('low-recovery') !== -1) items.push({ tone: 'urgent', text: 'low recovery' });
  if (signals.indexOf('poor-sleep') !== -1) items.push({ tone: 'watch', text: 'poor sleep' });
  const STATIC_SKIP = ['high-caffeine', 'very-high-caffeine', 'has-stims', 'has-nicotine', 'has-alcohol', 'poor-sleep', 'low-recovery', 'general-health-goal'];
  signals.filter(s => STATIC_SKIP.indexOf(s) === -1).forEach(s => items.push({ tone: 'mild', text: SIGNAL_LABELS[s] }));
  return items;
}

function tunerHtml() {
  function sel(id, label, value, options, disabled) {
    let o = '<option value=""' + (value === '' ? ' selected' : '') + '>—</option>';
    o += options.map(opt => '<option value="' + opt[0] + '"' + (value === opt[0] ? ' selected' : '') + '>' + opt[1] + '</option>').join('');
    return '<div class="tunerField"><label class="tunerLabel" for="' + id + '">' + label + '</label><select id="' + id + '" class="tunerInput" data-tuner="' + id + '"' + (disabled ? ' disabled' : '') + '>' + o + '</select></div>';
  }
  const m = effectiveMetrics();
  const locked = m.useWhoop;
  const recVal = m.recovery == null ? '' : m.recovery;
  const lockNote = locked ? '<span class="tunerFromWhoop">' + healthSourceLabel(whoopData) + '</span>' : '';
  let html = '<div class="tuner">'
    + sel('t-sex', 'Sex', profile.sex, [['M','Male'],['F','Female']])
    + '<div class="tunerField"><label class="tunerLabel" for="t-age">Age</label><input id="t-age" type="number" min="0" max="120" class="tunerInput" data-tuner="t-age" placeholder="—" value="' + (profile.age === '' ? '' : esc(profile.age)) + '" /></div>'
    + sel('t-goal', 'Goal', profile.goal, [['cut','Cut'],['bulk','Bulk'],['recomp','Recomp'],['maintain','Maintain'],['general_health','General health']])
    + sel('t-gym', 'Training', profile.gymLevel, [['beginner','Beginner'],['intermediate','Intermediate'],['advanced','Advanced']])
    + '<div class="tunerField"><label class="tunerLabel" for="t-caf">Caffeine mg/day</label><input id="t-caf" type="number" min="0" max="1000" step="10" class="tunerInput" data-tuner="t-caf" placeholder="0" value="' + (profile.caffeineMgPerDay || '') + '" /></div>'
    + '<div class="tunerField"><label class="tunerLabel" for="t-rec">Recovery %' + lockNote + '</label><input id="t-rec" type="number" min="0" max="100" class="tunerInput" data-tuner="t-rec" placeholder="—" value="' + (recVal === '' ? '' : esc(recVal)) + '"' + (locked ? ' disabled' : '') + ' /></div>'
    + sel('t-sleep', 'Sleep' + lockNote, m.sleep || '', [['good','Good'],['fair','Fair'],['poor','Poor']], locked);
  if (whoopData) {
    html += '<div class="tunerField tunerWhoop"><label class="tunerLabel">Vitals</label>'
      + '<label class="whoopToggle"><input type="checkbox" data-tuner="t-whoop"' + (profile.useWhoop ? ' checked' : '') + ' /> use my ' + esc(healthSourceLabel(whoopData)) + ' data</label>'
      + '<span class="whoopMeta">recovery + sleep · synced ' + whoopAgo(whoopData.ts) + '</span></div>';
  }
  html += '</div>';
  if (!whoopData) html += '<p class="tunerHint">No vitals yet — <a class="tunerHintLink" href="index.html">add recovery &amp; sleep on the dashboard</a> (Whoop, Apple Watch, or manual) and they auto-fill here.</p>';
  return html;
}

function scorePillHtml(score) {
  const tier = score >= 8 ? 'high' : score >= 6 ? 'mid' : 'low';
  return '<div class="scorePill scorePill_' + tier + '" aria-label="Score ' + score + ' of 10"><span class="scoreNum">' + score + '</span></div>';
}

function recsHtml() {
  const m = effectiveMetrics();
  const user = {
    age: profile.age === '' ? null : Number(profile.age),
    sex: profile.sex || null,
    goal: profile.goal || null,
    gymLevel: profile.gymLevel || null,
    caffeineMgPerDay: Number(profile.caffeineMgPerDay) || 0,
    recovery: m.recovery,
    sleep: m.sleep,
    hasStims: false, hasNicotine: false, hasAlcohol: false,
    alreadyTakingIds: new Set(state.items.map(i => i.sourceId).filter(Boolean)),
  };
  const res = recommend(user, { limit: 8 });
  const signals = res.signals;
  const recommendations = res.recommendations;
  const tickerItems = buildTickerItems(signals, user.caffeineMgPerDay);

  let header = '<header class="recHead"><span class="heroEyebrow"><span class="heroEyebrowMark">·03</span><span class="heroEyebrowRule"></span>Recommended for you</span>';
  if (tickerItems.length >= 2) {
    const rolled = tickerItems.concat(tickerItems);
    header += '<div class="recTicker" role="status" aria-label="Live inputs driving these picks">'
      + '<div class="recTickerEyebrow"><span class="recTickerPulse" aria-hidden></span>Rowan · live</div>'
      + '<div class="recTickerScroll"><div class="recTickerTrack">'
      + rolled.map(it => '<span class="recTickerItem" data-tone="' + it.tone + '">' + esc(it.text) + '</span>').join('')
      + '</div></div></div>';
  } else {
    header += '<p class="recSignalsEmpty">Set your profile below to unlock personalised picks — sex, goal, training level, and caffeine all tune the scores.</p>';
  }
  header += '</header>';

  let body;
  if (recommendations.length === 0) {
    body = '<p class="recEmpty">Nothing strongly indicated yet. Add more stack items and we’ll tune the recommendations as your profile fills in.</p>';
  } else {
    const packed = packToBudget(recommendations, budget);
    const totalInBudget = packed.inBudget.reduce((s, r) => s + r.supplement.priceUsdMonthly, 0);
    const totalIfAll = recommendations.reduce((s, r) => s + r.supplement.priceUsdMonthly, 0);

    let list = '<ul class="recList">';
    packed.all.forEach(({ rec, fits }) => {
      const s = rec.supplement;
      const win = windowMeta(s.window);
      const infoOpen = ui.recInfoFor === s.id;
      let why = '';
      if (rec.reasons.length > 0) {
        why = '<div class="recWhy"><span class="recWhyLabel">Why</span>' + rec.reasons.slice(0, 3).map(sig => '<span class="recWhyChip">' + esc(SIGNAL_LABELS[sig]) + '</span>').join('') + '</div>';
      }
      list += '<li class="recRow ' + (!fits ? 'recRowOver' : '') + '">'
        + '<div class="recRowMain">'
        +   scorePillHtml(rec.score)
        +   '<div class="recBody">'
        +     '<div class="recNameRow"><span class="recIcon" aria-hidden>' + s.icon + '</span><span class="recName">' + esc(s.name) + '</span>'
        +       '<button type="button" class="infoBtnInline" data-action="rec-info" data-id="' + esc(s.id) + '" aria-pressed="' + infoOpen + '">i</button></div>'
        +     '<div class="recMeta"><span class="recDose">' + esc(s.dose) + '</span><span class="recMetaSep">·</span>'
        +       '<span class="recWindow">' + (win ? win.icon + ' ' + esc(win.title.toLowerCase()) : '') + '</span><span class="recMetaSep">·</span>'
        +       '<a class="recBrandLink" href="' + esc(buyUrlFor(s)) + '" target="_blank" rel="noopener noreferrer" title="Find ' + esc(s.brand.split(/\s+or\s+/i)[0]) + ' ' + esc(s.name) + '">' + esc(s.brand) + '<span class="recBrandIcon" aria-hidden>↗</span></a>'
        +     '</div>'
        +     why
        +   '</div>'
        +   '<div class="recRight"><span class="recPrice">~$' + s.priceUsdMonthly + '<span class="recPriceUnit">/mo</span></span>'
        +     '<a class="recAddBtn" href="' + esc(buyUrlFor(s)) + '" target="_blank" rel="noopener noreferrer" title="Find this product">Order →</a>'
        +   '</div>'
        + '</div>'
        + (infoOpen ? '<div class="recInfoSlot">' + infoPopoverHtml(s, { hideAdd: false }) + '</div>' : '')
        + '</li>';
    });
    list += '</ul>';

    const ratio = budget > 0 ? Math.min(1, totalInBudget / budget) : 0;
    const budgetBar = '<div class="budgetWrap">'
      + '<div class="budgetRow"><label class="budgetLabel" for="rec-budget">Budget</label>'
      +   '<input id="rec-budget" type="range" min="20" max="250" step="5" value="' + budget + '" class="budgetSlider" />'
      +   '<span class="budgetAmount">$' + budget + '/mo</span></div>'
      + '<div class="budgetTrack" aria-hidden><div class="budgetTrackFill" style="width:' + (ratio * 100) + '%"></div></div>'
      + '<div class="budgetSummary"><span><strong>$' + totalInBudget + '</strong>/mo for top ' + packed.inBudget.length + ' of ' + recommendations.length + ' picks</span>'
      +   (totalIfAll > totalInBudget ? '<span class="budgetSecondary">$' + totalIfAll + '/mo to take all ' + recommendations.length + '</span>' : '')
      + '</div></div>';

    body = list + budgetBar
      + '<p class="recDisclaimer">Scores are based on the profile you set above. Brand picks are well-regarded mid-range options, not endorsements. Check with your doctor before starting anything new. Some links are affiliate; we may earn a small commission at no cost to you.</p>';
  }

  return '<section class="recCard">' + header + tunerHtml() + body + '</section>';
}

/* ============================================================
 * MAIN RENDER + preserve focus/caret on the search input
 * ============================================================ */
function render() {
  whoopData = loadWhoop(); // pick up Whoop connect/disconnect from the sibling tab
  const active = document.activeElement;
  const activeId = active ? active.id : null;
  const caret = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;

  document.getElementById('app').innerHTML =
    headerHtml() + heroHtml() + stackHtml() + addFormHtml() + recsHtml();

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (caret !== null && typeof el.setSelectionRange === 'function') {
        try { el.setSelectionRange(caret, caret); } catch {}
      }
    }
  }
}

/* ============================================================
 * EVENT WIRING (delegated)
 * ============================================================ */
function resetAddForm() {
  ui.name = ''; ui.dose = ''; ui.windowKey = 'anytime'; ui.note = ''; ui.icon = '💊';
  ui.sourceId = null; ui.searchOpen = false; ui.focusIdx = -1; ui.infoForId = null;
}
function pickResult(s) {
  ui.name = s.name; ui.dose = s.dose; ui.windowKey = s.window; ui.note = s.note;
  ui.icon = s.icon; ui.sourceId = s.id; ui.searchOpen = false; ui.infoForId = null;
  render();
  const inp = document.getElementById('supplement-search-input');
  if (inp) inp.focus();
}
function submitAdd() {
  const trimmed = ui.name.trim();
  if (!trimmed) return;
  addItem({ name: trimmed, icon: ui.icon || '💊', dose: ui.dose, window: ui.windowKey, note: ui.note, sourceId: ui.sourceId });
  resetAddForm();
  render();
  const inp = document.getElementById('supplement-search-input');
  if (inp) inp.focus();
}

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.getAttribute('data-action');
  const id = btn.getAttribute('data-id');
  switch (action) {
    case 'theme': applyTheme(btn.getAttribute('data-theme')); break;
    case 'toggle-taken': toggleTaken(id); break;
    case 'toggle-low': toggleLow(id); break;
    case 'remove': removeItem(id); break;
    case 'stack-info': ui.stackInfoFor = ui.stackInfoFor === id ? null : id; render(); break;
    case 'rec-info': ui.recInfoFor = ui.recInfoFor === id ? null : id; render(); break;
    case 'pick': { const s = lookupDb(id); if (s) pickResult(s); break; }
    case 'search-info': ui.infoForId = ui.infoForId === id ? null : id; render(); break;
    case 'info-close':
      ui.infoForId = null; ui.stackInfoFor = null; ui.recInfoFor = null; render(); break;
    case 'info-add': { const s = lookupDb(id); if (s) { pickResult(s); submitAdd(); } break; }
  }
});

document.addEventListener('submit', e => {
  if (e.target && e.target.id === 'addForm') { e.preventDefault(); submitAdd(); }
});

document.addEventListener('input', e => {
  const t = e.target;
  if (!t) return;
  if (t.id === 'supplement-search-input') {
    ui.name = t.value; ui.searchOpen = true; ui.focusIdx = -1;
    ui.sourceId = null; ui.note = ''; ui.icon = '💊'; ui.infoForId = null;
    render();
  } else if (t.id === 'supplement-dose-input') {
    // Re-render to refresh the hint line + Add button enabled state.
    ui.dose = t.value;
    render();
  } else if (t.id === 'rec-budget') {
    budget = parseInt(t.value, 10) || 0;
    render();
  } else if (t.getAttribute && t.getAttribute('data-tuner')) {
    const key = t.getAttribute('data-tuner');
    if (key === 't-age') profile.age = t.value === '' ? '' : t.value;
    else if (key === 't-caf') profile.caffeineMgPerDay = t.value === '' ? 0 : Number(t.value);
    else if (key === 't-rec') profile.recovery = t.value === '' ? '' : t.value;
    saveProfile();
    render();
  }
});

document.addEventListener('change', e => {
  const t = e.target;
  if (!t) return;
  if (t.id === 'supplement-window-input') { ui.windowKey = t.value; render(); }
  else if (t.getAttribute && t.getAttribute('data-tuner')) {
    const key = t.getAttribute('data-tuner');
    if (key === 't-sex') profile.sex = t.value;
    else if (key === 't-goal') profile.goal = t.value;
    else if (key === 't-gym') profile.gymLevel = t.value;
    else if (key === 't-sleep') profile.sleep = t.value;
    else if (key === 't-whoop') profile.useWhoop = t.checked;
    saveProfile();
    render();
  }
});

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && t.id === 'supplement-search-input') {
    const matches = search(ui.name);
    if (e.key === 'ArrowDown' && matches.length) {
      e.preventDefault(); ui.searchOpen = true; ui.focusIdx = Math.min(ui.focusIdx + 1, matches.length - 1); render();
    } else if (e.key === 'ArrowUp' && matches.length) {
      e.preventDefault(); ui.focusIdx = Math.max(ui.focusIdx - 1, 0); render();
    } else if (e.key === 'Enter') {
      if (ui.searchOpen && ui.focusIdx >= 0 && matches[ui.focusIdx]) { e.preventDefault(); pickResult(matches[ui.focusIdx]); }
      else { e.preventDefault(); submitAdd(); }
    } else if (e.key === 'Escape') {
      ui.searchOpen = false; ui.infoForId = null; render();
    }
  } else if (e.key === 'Escape') {
    if (ui.stackInfoFor || ui.recInfoFor || ui.infoForId) {
      ui.stackInfoFor = null; ui.recInfoFor = null; ui.infoForId = null; render();
    }
  }
});

// Close the search dropdown / pinned info when clicking outside the add name wrap.
document.addEventListener('mousedown', e => {
  const wrap = document.getElementById('addNameWrap');
  if (!wrap) return;
  if (wrap.contains(e.target)) return;
  if (ui.searchOpen || ui.infoForId) { ui.searchOpen = false; ui.infoForId = null; render(); }
});

// 6 AM rollover tick — refresh derived "today" state without a manual reload.
setInterval(() => { render(); }, 60000);

// Live-update when the Whoop tab connects/disconnects in another tab.
window.addEventListener('storage', e => {

    whoopData = loadWhoop();

  }
});
