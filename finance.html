<style>

/* ============================================================
 * Finance — restyled: "Patron" — soft-dark electric-violet
 * modern-fintech skin. 3 themes (Nocturne / Aurora / Daylight),
 * all driven by tokens. Logic untouched.
 * ============================================================ */

/* ---- Nocturne (default) ---- */
:root {
  color-scheme: dark;
  --bg: #0C0C12;
  --bg-elevated: #15151F;
  --surface: rgba(255,255,255,0.028);
  --surface-2: rgba(255,255,255,0.055);
  --fg: #F3F2F8;
  --muted: rgba(243,242,248,0.50);
  --muted-strong: rgba(243,242,248,0.74);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.17);

  --brand: #8B7CFF;
  --brand-2: #C7BBFF;
  --brand-ink: #130E2E;
  --brand-soft: rgba(139,124,255,0.12);
  --brand-line: rgba(139,124,255,0.28);
  --brand-glow: rgba(139,124,255,0.42);

  --pos: #46E0A8; --pos-soft: rgba(70,224,168,0.12); --pos-line: rgba(70,224,168,0.26);
  --neg: #FB7185; --neg-soft: rgba(251,113,133,0.12); --neg-line: rgba(251,113,133,0.26);
  --warn: #FBBF24; --warn-soft: rgba(251,191,36,0.10); --warn-line: rgba(251,191,36,0.26);

  --track: rgba(255,255,255,0.06);
  --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 18px 44px -30px rgba(0,0,0,0.85);
  --glow-1: rgba(139,124,255,0.12);
  --glow-2: rgba(70,224,168,0.05);
  --grain-opacity: 0.05;
  --overlay: rgba(6,6,12,0.66);
  --tabbar-grad: linear-gradient(to top, rgba(10,10,16,0.92) 55%, transparent);
  --tabbar-pill: rgba(26,26,36,0.9);

  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem;
  --space-12:3rem; --space-16:4rem;

  --radius-sm: 8px; --radius-md: 11px; --radius-lg: 18px; --radius-pill: 999px;

  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;

  --ease: cubic-bezier(0.2,0.8,0.2,1);
  --ease-premium: cubic-bezier(0.16,1,0.3,1);
  --duration-fast:120ms; --duration:200ms;

  --font-display:'Space Grotesk';
  --font-ui:'Hanken Grotesk';
  --font-mono:'JetBrains Mono';
}

/* ---- Aurora (vibrant violet → teal) ---- */
[data-theme="aurora"] {
  color-scheme: dark;
  --bg: #080913;
  --bg-elevated: #12131F;
  --surface: rgba(150,160,255,0.045);
  --surface-2: rgba(150,160,255,0.08);
  --fg: #EEF0FF;
  --muted: rgba(220,225,255,0.52);
  --muted-strong: rgba(220,225,255,0.76);
  --border: rgba(150,160,255,0.11);
  --border-strong: rgba(150,160,255,0.22);

  --brand: #8B7BFF;
  --brand-2: #B9ABFF;
  --brand-ink: #0A0922;
  --brand-soft: rgba(139,123,255,0.15);
  --brand-line: rgba(139,123,255,0.32);
  --brand-glow: rgba(124,107,255,0.6);

  --pos: #4FE3D0; --pos-soft: rgba(79,227,208,0.13); --pos-line: rgba(79,227,208,0.28);
  --neg: #FF6FA5; --neg-soft: rgba(255,111,165,0.13); --neg-line: rgba(255,111,165,0.28);
  --warn: #FFC65C; --warn-soft: rgba(255,198,92,0.11); --warn-line: rgba(255,198,92,0.28);

  --track: rgba(160,170,255,0.09);
  --card-shadow: 0 0 0 1px rgba(140,130,255,0.05) inset, 0 22px 56px -28px rgba(78,60,210,0.55);
  --glow-1: rgba(124,107,255,0.20);
  --glow-2: rgba(79,227,208,0.13);
  --grain-opacity: 0.05;
  --overlay: rgba(5,6,16,0.7);
  --tabbar-grad: linear-gradient(to top, rgba(8,9,19,0.92) 55%, transparent);
  --tabbar-pill: rgba(18,19,32,0.92);
}

/* ---- Daylight (light) ---- */
[data-theme="daylight"] {
  color-scheme: light;
  --bg: #F3F2FA;
  --bg-elevated: #FFFFFF;
  --surface: #FFFFFF;
  --surface-2: #FAF9FF;
  --fg: #171622;
  --muted: rgba(23,22,34,0.52);
  --muted-strong: rgba(23,22,34,0.72);
  --border: rgba(23,22,60,0.10);
  --border-strong: rgba(23,22,60,0.18);

  --brand: #6A45FF;
  --brand-2: #8E6BFF;
  --brand-ink: #FFFFFF;
  --brand-soft: rgba(106,69,255,0.08);
  --brand-line: rgba(106,69,255,0.24);
  --brand-glow: rgba(106,69,255,0.28);

  --pos: #0E9E64; --pos-soft: rgba(14,158,100,0.10); --pos-line: rgba(14,158,100,0.26);
  --neg: #E11D63; --neg-soft: rgba(225,29,99,0.08); --neg-line: rgba(225,29,99,0.24);
  --warn: #B4690E; --warn-soft: rgba(180,105,14,0.10); --warn-line: rgba(180,105,14,0.24);

  --track: rgba(23,22,60,0.08);
  --card-shadow: 0 1px 2px rgba(23,22,60,0.05), 0 16px 34px -24px rgba(23,22,60,0.24);
  --glow-1: rgba(106,69,255,0.07);
  --glow-2: rgba(14,158,100,0.04);
  --grain-opacity: 0.02;
  --overlay: rgba(28,26,52,0.4);
  --tabbar-grad: linear-gradient(to top, rgba(243,242,250,0.95) 55%, transparent);
  --tabbar-pill: rgba(255,255,255,0.94);
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-ui), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base);
  -webkit-font-smoothing: antialiased;
  transition: background var(--duration) var(--ease);
}

/* Grain */
.grain-overlay { position: relative; }
.grain-overlay::after {
  content:''; position: fixed; inset:0; pointer-events:none; z-index:1;
  opacity: var(--grain-opacity); mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 200px 200px;
}

/* Page shell */
.page { position: relative; min-height: 100dvh; background: var(--bg); color: var(--fg); padding: var(--space-8) var(--space-5) var(--space-16); isolation: isolate; }
.page::before {
  content:''; position: absolute; inset:0; pointer-events:none; z-index:-1;
  background:
    radial-gradient(58% 42% at 82% 6%, var(--glow-1), transparent 70%),
    radial-gradient(48% 38% at 12% 92%, var(--glow-2), transparent 72%);
}
.shell { max-width: 1000px; margin: 0 auto; padding-bottom: 96px; }

/* Header */
.header { display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-4); margin-bottom: var(--space-8); flex-wrap: wrap; }
.headerLeft { display:flex; flex-direction:column; gap: var(--space-3); }
.headerRight { display:flex; flex-direction:column; align-items:flex-end; gap: var(--space-2); }
.back {
  display:inline-flex; align-items:center; gap: var(--space-2); align-self:flex-start;
  padding: 6px 13px 6px 9px; background: var(--brand-soft); border: 1px solid var(--brand-line);
  border-radius: var(--radius-pill); color: var(--brand); font-size: var(--text-xs); font-weight: 600;
  letter-spacing: 0.01em; text-decoration: none;
  transition: background var(--duration) var(--ease-premium), border-color var(--duration) var(--ease-premium);
}
.back:hover { background: color-mix(in srgb, var(--brand) 18%, transparent); border-color: var(--brand); }
.backArrow { font-size: 14px; line-height: 1; }
.title { font-family: var(--font-display); font-weight: 600; font-size: var(--text-3xl); line-height: 1.0; letter-spacing: -0.03em; color: var(--fg); margin: 0; }
.subtitle { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin: 0; }

/* Theme + currency segmented controls */
.themeSeg, .currencySeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px; gap: 2px; }
.themeBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 0.02em; padding: 5px 11px 5px 8px; border-radius: var(--radius-pill); cursor: pointer; display:inline-flex; align-items:center; gap:6px; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.themeBtn:hover { color: var(--muted-strong); }
.themeSwatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px var(--border-strong) inset; flex-shrink:0; }
.themeBtnActive, .themeBtnActive:hover { background: var(--brand-soft); color: var(--fg); }
.themeBtnActive .themeSwatch { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--brand); }
.currencyBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; padding: 5px 11px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.currencyBtn:hover { color: var(--muted-strong); }
.currencyBtnActive, .currencyBtnActive:hover { background: var(--brand); color: var(--brand-ink); }

/* Section */
.section { margin-bottom: var(--space-10); }
.sectionEyebrow { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); letter-spacing: -0.02em; color: var(--fg); margin-bottom: var(--space-4); display:flex; align-items:baseline; justify-content:space-between; gap: var(--space-3); }
.sectionEyebrow > span:first-child { display:inline-flex; align-items:center; gap: 10px; }
.sectionEyebrow > span:first-child::before { content:''; width: 7px; height: 18px; border-radius: 3px; background: var(--brand); box-shadow: 0 0 12px -2px var(--brand-glow); }
.sectionCount { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.sectionCountSep { color: var(--brand); font-weight: 600; }

/* NW hero */
.nwHero { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap: var(--space-4); margin-bottom: var(--space-5); }
.nwHeroFirstRun { align-items: stretch; }
.nwHeroLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.nwHeroNum { font-family: var(--font-display); font-size: 46px; font-weight: 600; line-height: 1.0; letter-spacing: -0.03em; margin-top: 6px; font-variant-numeric: tabular-nums; }
.nwHeroBreakdown { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 8px; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
.nwHeroMain { flex: 1; min-width: 0; }
.nwHeroNumRow { display:inline-flex; align-items:baseline; gap: var(--space-3); flex-wrap: wrap; }
.firstRunHint { margin-top: var(--space-3); font-size: 13px; color: var(--muted-strong); line-height: 1.5; max-width: 38ch; }

.dailyDelta { display:inline-flex; align-items:baseline; gap: 6px; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; padding: 4px 10px; border-radius: var(--radius-pill); border: 1px solid transparent; background: var(--surface-2); color: var(--muted-strong); white-space: nowrap; }
.dailyDelta.up { background: var(--pos-soft); border-color: var(--pos-line); color: var(--pos); }
.dailyDelta.down { background: var(--neg-soft); border-color: var(--neg-line); color: var(--neg); }
.dailyDelta.flat { color: var(--muted); font-style: italic; }
.dailyDeltaPct { font-weight: 500; opacity: 0.8; }
.dailyDeltaWindow { font-family: var(--font-mono); font-size: 9px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: inherit; opacity: 0.6; }

/* Import trigger */
.importTrigger { display:inline-flex; align-items:center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); color: var(--fg); cursor: pointer; text-align:left; transition: border-color var(--duration) var(--ease), background var(--duration) var(--ease), transform var(--duration) var(--ease), box-shadow var(--duration) var(--ease); font-family: inherit; }
.importTrigger:hover { border-color: var(--brand-line); background: var(--brand-soft); transform: translateY(-1px); box-shadow: 0 0 36px -16px var(--brand-glow); }
.importTriggerIcon { display:grid; place-items:center; width: 34px; height: 34px; border-radius: 12px; background: var(--brand); color: var(--brand-ink); font-family: var(--font-display); font-weight: 600; font-size: 17px; flex-shrink:0; }
.importTriggerText { display:flex; flex-direction:column; gap: 3px; min-width: 0; }
.importTriggerTitle { font-size: var(--text-sm); font-weight: 700; line-height: 1.3; color: var(--fg); white-space: nowrap; }
.nwHero .importTrigger { min-width: 288px; }
.importTriggerSub { font-size: 11px; color: var(--muted); letter-spacing: 0.01em; }
.section > .importTrigger { margin-bottom: var(--space-4); }
.importTriggerLarge { padding: var(--space-4) var(--space-5); gap: var(--space-4); border-color: var(--brand-line); background: var(--brand-soft); box-shadow: 0 0 40px -20px var(--brand-glow); align-self: stretch; min-width: 280px; }
.importTriggerLarge .importTriggerIcon { width: 46px; height: 46px; font-size: 22px; border-radius: 14px; }
.importTriggerLarge .importTriggerTitle { font-size: var(--text-base); }
.importTriggerLarge .importTriggerSub { font-size: 12px; color: var(--muted-strong); }
@media (max-width: 560px) { .importTrigger { width: 100%; } }

/* Import modal */
.importOverlay { position: fixed; inset:0; background: var(--overlay); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; display:grid; place-items:center; padding: var(--space-4); animation: importFade 200ms var(--ease-premium); }
@keyframes importFade { from { opacity:0; } to { opacity:1; } }
.importPanel { width: min(520px, 100%); background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-6); box-shadow: 0 28px 70px -16px rgba(0,0,0,0.6); animation: importRise 320ms var(--ease-premium); }
@keyframes importRise { from { opacity:0; transform: translateY(12px) scale(0.98); } to { opacity:1; transform:none; } }
.importHead { display:flex; justify-content:space-between; align-items:flex-start; gap: var(--space-3); margin-bottom: var(--space-5); }
.importEyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--brand); }
.importTitle { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.5rem, 3.2vw, 2rem); line-height: 1.05; letter-spacing: -0.03em; margin: var(--space-2) 0 0; color: var(--fg); }
.importTitle em { font-style: normal; color: var(--brand); }
.importClose { background: transparent; border: 1px solid var(--border); color: var(--muted-strong); font-size: 22px; line-height: 1; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: color var(--duration) var(--ease), border-color var(--duration) var(--ease); flex-shrink:0; }
.importClose:hover { color: var(--fg); border-color: var(--border-strong); }
.importDesc { color: var(--muted-strong); font-size: var(--text-sm); line-height: 1.55; margin: 0 0 var(--space-4); }
.dropZone { display:flex; flex-direction:column; align-items:center; justify-content:center; gap: var(--space-2); padding: var(--space-8) var(--space-4); border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); background: var(--brand-soft); text-align:center; }
.dropIcon { display:grid; place-items:center; width: 50px; height: 50px; border-radius: 16px; background: var(--brand); color: var(--brand-ink); font-size: 22px; font-weight: 600; margin-bottom: var(--space-2); }
.dropTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl); color: var(--fg); }
.dropSub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.setupNote { margin: var(--space-4) 0 0; padding: var(--space-3) var(--space-4); border-left: 2px solid var(--warn-line); background: var(--warn-soft); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: var(--text-xs); line-height: 1.55; color: var(--muted-strong); }
.setupNote strong { color: var(--warn); font-weight: 600; }

/* Overview grid */
.overviewGrid { display:grid; grid-template-columns: 1.6fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
@media (max-width: 720px) { .overviewGrid { grid-template-columns: 1fr; } }
.chartWrap, .donutWrap { position: relative; padding: var(--space-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); }
.chartHead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: var(--space-4); gap: var(--space-3); flex-wrap: wrap; }
.chartHeadLeft { display:inline-flex; align-items:baseline; gap: var(--space-3); }
.chartLabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.chartDelta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
.chartDelta.up { color: var(--pos); } .chartDelta.down { color: var(--neg); }
.periodSeg { display:inline-flex; align-items:center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 2px; gap: 1px; }
.periodBtn { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 5px 10px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }
.periodBtn:hover { color: var(--muted-strong); }
.periodBtnActive, .periodBtnActive:hover { background: var(--brand); color: var(--brand-ink); }
.chartSvg { display:block; width: 100%; height: 144px; color: var(--pos); }
.chartGrid { stroke: var(--border); stroke-width: 0.5; }
.chartLineStroke { filter: drop-shadow(0 0 7px currentColor); }
.chartEmpty { text-align:center; color: var(--muted); font-size: var(--text-sm); padding: var(--space-6) 0; }
.chartStatsRow { display:grid; grid-template-columns: repeat(4,1fr); gap: var(--space-3); margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border); }
.chartStat { display:flex; flex-direction:column; gap: 3px; }
.chartStatLabel { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.chartStatVal { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--fg); }

/* Donut */
.donutStage { position: relative; display:flex; align-items:center; justify-content:center; margin: var(--space-3) 0; }
.donutSvg { width: 162px; height: 162px; }
.donutCenter { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
.donutNum { font-family: var(--font-display); font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.donutSub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.donutEmpty { text-align:center; color: var(--muted); font-size: var(--text-sm); padding: var(--space-3) 0; }
.donutLegend { display:flex; flex-direction:column; gap: 8px; margin-top: var(--space-3); }
.donutLeg { display:grid; grid-template-columns: 12px 1fr auto; align-items:center; gap: 9px; font-size: 12px; color: var(--muted-strong); }
.donutLegDot { width: 9px; height: 9px; border-radius: 3px; }

.inlineEditInput { width: 100%; background: var(--bg-elevated); border: 1px solid var(--brand-line); border-radius: 6px; padding: 4px 7px; color: var(--fg); font-family: var(--font-mono); font-size: 13px; outline: none; font-variant-numeric: tabular-nums; }

/* Orders */

/* Wishlist */

/* Tab bar */

.tab { appearance:none; background: transparent; border:0; color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; padding: 9px 18px; border-radius: var(--radius-pill); cursor: pointer; transition: background var(--duration) var(--ease-premium), color var(--duration) var(--ease-premium); }

/* Aurora flourish: gradient hero number */

  background: linear-gradient(100deg, var(--brand-2) 0%, var(--pos) 120%);

}

/* Settings (API keys) */

.settingsInput { width:100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; color: var(--fg); font-family: var(--font-mono); font-size: 13px; outline: none; transition: border-color var(--duration) var(--ease-premium), box-shadow var(--duration) var(--ease-premium); }

.ghostBtn:hover { color: var(--fg); border-color: var(--border-strong); }
.importStatus { display:flex; flex-direction:column; align-items:center; gap: var(--space-3); padding: var(--space-8) var(--space-4); text-align:center; }
.importSpinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--brand-soft); border-top-color: var(--brand); animation: importSpin 800ms linear infinite; }
@keyframes importSpin { to { transform: rotate(360deg); } }
.importStatusTitle { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); color: var(--fg); }
.importStatusBody { font-size: 12px; color: var(--muted); max-width: 40ch; line-height: 1.55; }
.importStatus.error .importStatusTitle { color: var(--neg); }
.dropZone.clickable { cursor: pointer; transition: border-color var(--duration) var(--ease-premium), background var(--duration) var(--ease-premium); }
.dropZone.clickable:hover { border-color: var(--brand); background: color-mix(in srgb, var(--brand) 14%, transparent); }

</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell" id="app"></div>
</main>
<div id="modalRoot"></div>
<script>
/* ============================================================
 * Pure helpers — ported from state.ts
 * ============================================================ */
const STORAGE_KEY = 'finance_standalone_v1';
const ACTIVITY_MAX = 50;
const NW_HISTORY_MAX = 500;
const CURRENCIES = ['CHF', 'USD', 'EUR', 'GBP'];
const TAB_KEYS = ['net', 'subs', 'orders', 'wish'];
const TAB_LABELS = { net: 'net worth', subs: 'subs', orders: 'orders', wish: 'wishlist' };
const DEFAULT_RATES = { CHF: 1, USD: 1, EUR: 1, GBP: 1 };

function genId(prefix) { return (prefix || 'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }

function fmtMoney(amountCHF, currency, rates) {
  const rate = rates[currency] || 1;
  const num = (Number(amountCHF) || 0) * rate;
  const hasFraction = Math.abs(num % 1) > 0.005;
  return currency + ' ' + num.toLocaleString('en-US', { minimumFractionDigits: hasFraction ? 2 : 0, maximumFractionDigits: 2 });
}
function displayToChf(amount, currency, rates) { return amount / (rates[currency] || 1); }
function chfToDisplay(amountCHF, currency, rates) { return amountCHF * (rates[currency] || 1); }
function monthlyEquivalent(s) { const a = Number(s.amountCHF) || 0; if (s.period === 'yearly') return a / 12; if (s.period === 'weekly') return a * 4.345; return a; }
function netWorthChf(accounts) { return accounts.reduce((sum, a) => sum + (Number(a.amountCHF) || 0), 0); }
function netWorthByType(accounts) { const out = { bank: 0, stocks: 0, crypto: 0, other: 0 }; accounts.forEach(a => { out[a.type] = (out[a.type] || 0) + (Number(a.amountCHF) || 0); }); return out; }

function nextRenewalDate(iso, period) {
  if (!iso) return null;
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe);
  if (isNaN(d.getTime())) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let safety = 0;
  while (d < today && safety++ < 600) {
    if (period === 'weekly') d.setDate(d.getDate() + 7);
    else if (period === 'yearly') d.setFullYear(d.getFullYear() + 1);
    else d.setMonth(d.getMonth() + 1);
  }
  return d;
}
function formatActivityDate(ts) {
  const d = new Date(ts), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterday = today - 86400000;
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  if (dayStart === today) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (dayStart === yesterday) return 'yest';
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}
function formatRenewal(iso) {
  if (!iso) return '';
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((dayStart.getTime() - today.getTime()) / 86400000);
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  let prefix = '';
  if (diffDays < 0) prefix = 'past · ';
  else if (diffDays === 0) prefix = 'today · ';
  else if (diffDays === 1) prefix = 'tomorrow · ';
  else if (diffDays <= 7) prefix = 'in ' + diffDays + 'd · ';
  return prefix + dateLabel;
}
function pctClass(pct) { if (pct < 5) return 'good'; if (pct < 25) return 'warn'; return 'bad'; }
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ============================================================
 * State + persistence
 * ============================================================ */
const DEFAULT_STATE = { version: 1, currency: 'CHF', activeTab: 'net', accounts: [], subscriptions: [], orders: [], wishlist: [], activity: [], netWorthHistory: [] };

function load() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return Object.assign({}, DEFAULT_STATE); return Object.assign({}, DEFAULT_STATE, JSON.parse(raw)); }
  catch { return Object.assign({}, DEFAULT_STATE); }
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

let state = load();
let rates = Object.assign({}, DEFAULT_RATES);

/* ---- API keys / settings (stored only in this browser) ---- */
const SETTINGS_KEY = 'finance_settings_v1';
const DEFAULT_MODEL = 'claude-haiku-4-5'; // cheapest vision-capable model — never use Sonnet/Opus for OCR
function loadSettings() {
  try { return Object.assign({ finnhubKey: '', anthropicKey: '', anthropicModel: DEFAULT_MODEL }, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')); }
  catch { return { finnhubKey: '', anthropicKey: '', anthropicModel: DEFAULT_MODEL }; }
}
function saveSettings() { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {} }
let settings = loadSettings();

/* UI session state (not persisted) */
const ui = {
  chartPeriod: 'ALL',
  show: {},          // bankAdd, cryptoAdd, otherAdd, stocksAdd, stocksManual
  edit: null,        // { id, field:'name'|'amt'|'shares' }
  subEditId: null,
  importOpen: null,  // 'statement' | 'subs' | 'receipt'
  settingsOpen: false,
  importBusy: false, importError: null, importResult: null,
  pricesBusy: false,
  drafts: {
    bank: { name: '', amt: '' }, crypto: { name: '', amt: '' }, other: { name: '', amt: '' },
    stockHold: { ticker: '', shares: '' }, stockManual: { name: '', amt: '' },
    subAdd: { name: '', amount: '', period: 'monthly', renewal: '', from: '', auto: false },
    subEdit: null,
    order: { mode: 'incoming', name: '', cost: '', from: '', arrival: '' },
    wish: { name: '', amount: '' },
  },
};

function fmt(chf) { return fmtMoney(chf, state.currency, rates); }

/* ---- NW snapshot ---- */
function maybeSnapshotNw() {
  const total = netWorthChf(state.accounts);
  const h = state.netWorthHistory;
  const last = h[h.length - 1];
  if (last && Math.abs((last.v || 0) - total) < 0.005) return;
  h.push({ t: Date.now(), v: total });
  if (h.length > NW_HISTORY_MAX) h.splice(0, h.length - NW_HISTORY_MAX);
}
function pushActivity(entry) {
  state.activity.push(Object.assign({ id: genId('act'), ts: Date.now() }, entry));
  if (state.activity.length > ACTIVITY_MAX) state.activity.splice(0, state.activity.length - ACTIVITY_MAX);
}

/* ============================================================
 * Actions
 * ============================================================ */
const actions = {
  setCurrency(c) { state.currency = c; save(); render(); },
  setActiveTab(t) { state.activeTab = t; save(); render(); },

  addAccount(type, name, displayAmount) {
    const trimmed = name.trim(); if (!trimmed || !isFinite(displayAmount)) return;
    const amountCHF = displayToChf(displayAmount, state.currency, rates);
    state.accounts.push({ id: genId('acc'), type, name: trimmed, amountCHF });
    pushActivity({ accountType: type, name: trimmed, deltaCHF: amountCHF, kind: 'add' });
    maybeSnapshotNw(); save(); render();
  },
  renameAccount(id, name) { const a = state.accounts.find(x => x.id === id); if (a) a.name = name.trim() || a.name; save(); render(); },
  setAccountAmount(id, displayAmount) {
    const acct = state.accounts.find(a => a.id === id); if (!acct || !isFinite(displayAmount)) return;
    const next = Math.max(0, displayToChf(displayAmount, state.currency, rates));
    const delta = next - acct.amountCHF; acct.amountCHF = next;
    if (Math.abs(delta) >= 0.005) pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' });
    maybeSnapshotNw(); save(); render();
  },
  deleteAccount(id) {
    const acct = state.accounts.find(a => a.id === id); if (!acct) return;
    state.accounts = state.accounts.filter(a => a.id !== id);
    pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: -acct.amountCHF, kind: 'delete' });
    maybeSnapshotNw(); save(); render();
  },
  addHolding(ticker, shares) {
    const t = ticker.trim().toUpperCase(); if (!t || !isFinite(shares) || shares <= 0) return;
    // No live price source in the standalone — value stays 0 until you switch
    // to a manual entry or use the hosted app. Shown as "—".
    state.accounts.push({ id: genId('acc'), type: 'stocks', name: t, ticker: t, shares, amountCHF: 0 });
    save(); render();
  },
  setHoldingShares(id, shares) { const a = state.accounts.find(x => x.id === id); if (a && a.type === 'stocks' && a.ticker && isFinite(shares) && shares >= 0) a.shares = shares; save(); render(); },

  addSubscription(input) {
    const name = input.name.trim(); if (!name || !isFinite(input.displayAmount)) return;
    state.subscriptions.push({
      id: genId('sub'), name, amountCHF: displayToChf(input.displayAmount, state.currency, rates), period: input.period,
      enteredAmount: input.displayAmount, enteredCurrency: state.currency, renewal: input.renewal || null,
      fromAccountId: input.fromAccountId || null, autoDeduct: !!input.autoDeduct, lastDeductedAt: null,
    });
    save(); render();
  },
  updateSubscription(id, patch) {
    const sub = state.subscriptions.find(x => x.id === id); if (!sub) return;
    let amountCHF = sub.amountCHF;
    if (typeof patch.displayAmount === 'number' && isFinite(patch.displayAmount)) {
      const ccy = patch.enteredCurrency || sub.enteredCurrency || state.currency;
      amountCHF = displayToChf(patch.displayAmount, ccy, rates);
    }
    Object.assign(sub, patch, { amountCHF, enteredAmount: patch.displayAmount != null ? patch.displayAmount : sub.enteredAmount });
    delete sub.displayAmount;
    save(); render();
  },
  deleteSubscription(id) { state.subscriptions = state.subscriptions.filter(x => x.id !== id); save(); render(); },
  toggleSubAutoDeduct(id) { const s = state.subscriptions.find(x => x.id === id); if (s) s.autoDeduct = !s.autoDeduct; save(); render(); },

  addOrder(input) {
    const name = input.name.trim(); if (!name || !isFinite(input.displayAmount)) return;
    const amountCHF = displayToChf(input.displayAmount, state.currency, rates);
    let deductedAt = null, pctAtDeduction = null, deductedFromName = null;
    if (input.immediate && input.fromAccountId) {
      const acct = state.accounts.find(a => a.id === input.fromAccountId);
      if (acct) {
        const grand = netWorthChf(state.accounts);
        pctAtDeduction = grand > 0 ? (amountCHF / grand) * 100 : 0;
        deductedAt = Date.now(); deductedFromName = acct.name;
        const nextAmount = Math.max(0, acct.amountCHF - amountCHF);
        const delta = nextAmount - acct.amountCHF; acct.amountCHF = nextAmount;
        pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' });
      }
    }
    state.orders.push({ id: genId('ord'), name, amountCHF, enteredAmount: input.displayAmount, enteredCurrency: state.currency, fromAccountId: input.fromAccountId || null, date: input.date || null, ts: Date.now(), deductedAt, pctAtDeduction, deductedFromName });
    maybeSnapshotNw(); save(); render();
  },
  deleteOrder(id) { state.orders = state.orders.filter(x => x.id !== id); save(); render(); },
  deductOrder(id) {
    const order = state.orders.find(x => x.id === id); if (!order || order.deductedAt) return;
    const grand = netWorthChf(state.accounts);
    const pct = grand > 0 ? (order.amountCHF / grand) * 100 : 0;
    const acct = order.fromAccountId ? state.accounts.find(a => a.id === order.fromAccountId) : null;
    if (acct) { const nextAmount = Math.max(0, acct.amountCHF - order.amountCHF); const delta = nextAmount - acct.amountCHF; acct.amountCHF = nextAmount; pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: delta, kind: 'edit' }); }
    order.deductedAt = Date.now(); order.pctAtDeduction = pct; order.deductedFromName = acct ? acct.name : null;
    maybeSnapshotNw(); save(); render();
  },
  undoDeductOrder(id) {
    const order = state.orders.find(x => x.id === id); if (!order || !order.deductedAt) return;
    const acct = order.fromAccountId ? state.accounts.find(a => a.id === order.fromAccountId) : null;
    if (acct) { acct.amountCHF += order.amountCHF; pushActivity({ accountType: acct.type, name: acct.name, deltaCHF: order.amountCHF, kind: 'edit' }); }
    order.deductedAt = null; order.pctAtDeduction = null; order.deductedFromName = null;
    maybeSnapshotNw(); save(); render();
  },

  addWish(name, displayAmount) {
    const trimmed = name.trim(); if (!trimmed || !isFinite(displayAmount)) return;
    state.wishlist.push({ id: genId('wish'), name: trimmed, amountCHF: displayToChf(displayAmount, state.currency, rates), enteredAmount: displayAmount, enteredCurrency: state.currency, ts: Date.now() });
    save(); render();
  },
  deleteWish(id) { state.wishlist = state.wishlist.filter(x => x.id !== id); save(); render(); },
};

/* ============================================================
 * Constants for views
 * ============================================================ */
let TYPE_COLORS = { bank: '#8B7CFF', stocks: '#C7BBFF', crypto: '#46E0A8', other: 'rgba(243,242,248,0.4)' };
let SUBS_COLOR = '#FBBF24';
const THEMES = [
  { key: 'nocturne', label: 'Nocturne', swatch: '#8B7CFF' },
  { key: 'aurora', label: 'Aurora', swatch: 'linear-gradient(135deg,#8B7BFF,#4FE3D0)' },
  { key: 'daylight', label: 'Daylight', swatch: '#6A45FF' },
];
const THEME_PALETTES = {
  nocturne: { bank: '#8B7CFF', stocks: '#C7BBFF', crypto: '#46E0A8', other: 'rgba(243,242,248,0.4)', subs: '#FBBF24' },
  aurora:   { bank: '#8B7BFF', stocks: '#B9ABFF', crypto: '#4FE3D0', other: 'rgba(220,225,255,0.4)', subs: '#FFC65C' },
  daylight: { bank: '#6A45FF', stocks: '#9E84FF', crypto: '#0E9E64', other: 'rgba(23,22,34,0.4)', subs: '#B4690E' },
};
let currentTheme = (function(){ try { return localStorage.getItem('patron_theme') || 'nocturne'; } catch(e){ return 'nocturne'; } })();
if (!THEME_PALETTES[currentTheme]) currentTheme = 'nocturne';
function applyTheme(name){
  if (!THEME_PALETTES[name]) name = 'nocturne';
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  const p = THEME_PALETTES[name];
  TYPE_COLORS = { bank: p.bank, stocks: p.stocks, crypto: p.crypto, other: p.other };
  SUBS_COLOR = p.subs;
  try { localStorage.setItem('patron_theme', name); } catch(e){}
  render();
}
const TYPE_LABELS = { bank: 'Bank', stocks: 'Stocks', crypto: 'Crypto', other: 'Other' };
const CATEGORY_ORDER = [
  { key: 'bank', label: 'Bank accounts', ph1: 'Account name', ph2: 'Amount' },
  { key: 'stocks', label: 'Stocks · investments', ph1: 'Stock / fund', ph2: 'Value' },
  { key: 'crypto', label: 'Crypto', ph1: 'Coin / wallet', ph2: 'Value' },
  { key: 'other', label: 'Other assets', ph1: 'Asset name', ph2: 'Value' },
];
const CHART_PERIODS = [ { key:'1D',label:'1D',days:1 }, { key:'1W',label:'1W',days:7 }, { key:'1M',label:'1M',days:30 }, { key:'1Y',label:'1Y',days:365 }, { key:'ALL',label:'All',days:null } ];

/* ============================================================
 * Header + ticker
 * ============================================================ */
function headerHtml() {
  const themeSeg = THEMES.map(t => '<button type="button" class="themeBtn ' + (t.key === currentTheme ? 'themeBtnActive' : '') + '" data-act="theme" data-theme="' + t.key + '"><span class="themeSwatch" style="background:' + t.swatch + '"></span>' + t.label + '</button>').join('');
  const segs = CURRENCIES.map(c => '<button type="button" class="currencyBtn ' + (c === state.currency ? 'currencyBtnActive' : '') + '" data-act="currency" data-c="' + c + '">' + c + '</button>').join('');
  return '<header class="header"><div class="headerLeft">'
    + '<a class="back" href="index.html"><span class="backArrow">←</span> Rowan</a>'
    + '<h1 class="title">Finance</h1><p class="subtitle">Net worth · subs · orders · wishlist</p>'
    + '</div>'
    + '<div class="headerRight">'
    + '<div class="headerControls">'
    + '<div class="themeSeg" role="radiogroup" aria-label="Theme">' + themeSeg + '</div>'
    + '<button type="button" class="settingsBtn" data-act="openSettings" title="API keys & settings" aria-label="Settings">⚙</button>'
    + '</div>'
    + '<div class="currencySeg" role="radiogroup" aria-label="Display currency">' + segs + '</div>'
    + '</div></header>';
}

function tickerEntries() {
  const out = [];
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  state.subscriptions.forEach(s => {
    if (!s.renewal) return;
    const next = nextRenewalDate(s.renewal, s.period);
    if (!next) return;
    out.push({ id: s.id, name: s.name, amountCHF: s.amountCHF, days: Math.round((next.getTime() - today) / 86400000) });
  });
  out.sort((a, b) => a.days - b.days);
  return out;
}
function daysLabel(d) { if (d < 0) return Math.abs(d) + 'd late'; if (d === 0) return 'today'; if (d === 1) return 'tomorrow'; return 'in ' + d + 'd'; }

function tickerHtml() {
  const entries = tickerEntries();
  if (entries.length === 0) return '';
  const cur = entries[tickerIdx % entries.length];
  const urgent = cur && cur.days <= 5;
  const items = entries.map((e, i) => '<div class="tickerItem ' + (i === (tickerIdx % entries.length) ? 'active' : '') + '"><span class="tickerItemName">' + esc(e.name) + '</span><span class="tickerItemAmt">' + esc(fmt(e.amountCHF)) + '</span><span class="tickerItemDays">' + daysLabel(e.days) + '</span></div>').join('');
  const dots = entries.map((e, i) => '<span class="tickerDot ' + (i === (tickerIdx % entries.length) ? 'active' : '') + '"></span>').join('');
  return '<div class="ticker ' + (urgent ? 'urgent' : '') + '"><span class="tickerTag">renews</span><div class="tickerStream">' + items + '</div><div class="tickerDots">' + dots + '</div></div>';
}
let tickerIdx = 0, tickerTimer = null;
function mountTicker() {
  if (tickerTimer) { clearInterval(tickerTimer); tickerTimer = null; }
  const entries = tickerEntries();
  if (entries.length < 2) return;
  tickerTimer = setInterval(() => {
    tickerIdx = (tickerIdx + 1) % entries.length;
    document.querySelectorAll('.tickerItem').forEach((el, i) => el.classList.toggle('active', i === tickerIdx));
    document.querySelectorAll('.tickerDot').forEach((el, i) => el.classList.toggle('active', i === tickerIdx));
  }, 5000);
}

/* ============================================================
 * NET WORTH view
 * ============================================================ */
function dailyDeltaHtml() {
  const history = state.netWorthHistory;
  if (history.length < 2) return '';
  const last = history[history.length - 1];
  const cutoff = last.t - 86400000;
  let baseline = null;
  for (let i = history.length - 1; i >= 0; i--) { if (history[i].t <= cutoff) { baseline = history[i]; break; } }
  if (!baseline) baseline = history[0];
  if (last.t - baseline.t < 3600000) return '';
  const delta = last.v - baseline.v;
  const pct = Math.abs(baseline.v) > 0.005 ? (delta / Math.abs(baseline.v)) * 100 : null;
  if (Math.abs(delta) < 0.005) return '<span class="dailyDelta flat">flat · 24h</span>';
  const up = delta > 0, sign = up ? '+' : '−';
  const pctLabel = pct == null ? '' : '<span class="dailyDeltaPct">' + (up ? '+' : '−') + (Math.abs(pct) >= 100 ? Math.abs(pct).toFixed(0) : Math.abs(pct).toFixed(2)) + '%</span>';
  return '<span class="dailyDelta ' + (up ? 'up' : 'down') + '">' + sign + esc(fmt(Math.abs(delta))) + pctLabel + '<span class="dailyDeltaWindow">· 24h</span></span>';
}

function smoothPath(points) {
  if (points.length < 2) return '';
  if (points.length === 2) return 'M' + points[0].x + ',' + points[0].y + ' L' + points[1].x + ',' + points[1].y;
  const d = ['M' + points[0].x + ',' + points[0].y];
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i-1] || points[i], p1 = points[i], p2 = points[i+1], p3 = points[i+2] || p2;
    const c1x = p1.x + (p2.x - p0.x)/6, c1y = p1.y + (p2.y - p0.y)/6, c2x = p2.x - (p3.x - p1.x)/6, c2y = p2.y - (p3.y - p1.y)/6;
    d.push('C' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + p2.x + ',' + p2.y);
  }
  return d.join(' ');
}

function chartHtml() {
  const W = 600, H = 200, PAD = 8;
  const activePeriod = CHART_PERIODS.find(p => p.key === ui.chartPeriod) || CHART_PERIODS[CHART_PERIODS.length - 1];
  const full = state.netWorthHistory;
  let history;
  if (activePeriod.days == null) history = full;
  else {
    const cutoff = Date.now() - activePeriod.days * 86400000;
    const inWin = full.filter(p => p.t >= cutoff);
    if (inWin.length >= 2 || full.length === 0) history = inWin;
    else { let anchor = null; for (let i = full.length - 1; i >= 0; i--) { if (full[i].t < cutoff) { anchor = full[i]; break; } } history = anchor ? [anchor].concat(inWin) : inWin; }
  }
  const seg = CHART_PERIODS.map(p => '<button type="button" class="periodBtn ' + (p.key === ui.chartPeriod ? 'periodBtnActive' : '') + '" data-act="chartPeriod" data-p="' + p.key + '">' + p.label + '</button>').join('');
  const periodToggle = '<div class="periodSeg">' + seg + '</div>';

  function statsRow(hist) {
    if (!hist.length) return '<div class="chartStatsRow">' + stat('1% of NW','-') + stat('All-time high','-') + stat('All-time low','-') + stat('Snapshots','0') + '</div>';
    const vals = hist.map(p => p.v), last = vals[vals.length - 1];
    return '<div class="chartStatsRow">' + stat('1% of NW', fmt(last/100)) + stat('All-time high', fmt(Math.max.apply(null, vals))) + stat('All-time low', fmt(Math.min.apply(null, vals))) + stat('Snapshots', String(hist.length)) + '</div>';

  function stat(l, v) { return '<div class="chartStat"><span class="chartStatLabel">' + esc(l) + '</span><span class="chartStatVal">' + esc(v) + '</span></div>'; }

  if (history.length < 1) {

  }
  const first = history[0].v, last = history[history.length - 1].v, change = last - first;
  const direction = Math.abs(change) < 0.005 ? 'flat' : change > 0 ? 'up' : 'down';
  const color = direction === 'up' ? 'var(--pos)' : direction === 'down' ? 'var(--neg)' : 'var(--muted)';
  let deltaLabel = '-';
  if (direction === 'flat') deltaLabel = 'Flat';

  const vals = history.map(p => p.v), minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  const range = (maxV - minV) || Math.max(1, Math.abs(maxV));
  let lineD = '', areaD = '';
  if (history.length === 1) { const y = H/2; lineD = 'M0,' + y + ' L' + W + ',' + y; areaD = lineD + ' L' + W + ',' + H + ' L0,' + H + ' Z'; }
  else {
    const points = history.map((p, i) => ({ x: (i/(history.length-1))*W, y: H - PAD - ((p.v - minV)/range)*(H - PAD*2) }));
    lineD = smoothPath(points); const lp = points[points.length-1], fp = points[0]; areaD = lineD + ' L' + lp.x + ',' + H + ' L' + fp.x + ',' + H + ' Z';
  }
  return '<div class="chartWrap"><div class="chartHead"><div class="chartHeadLeft"><span class="chartLabel">' + (activePeriod.key === 'ALL' ? 'All-time' : activePeriod.label) + '</span>'
    + '<span class="chartDelta ' + (direction === 'up' ? 'up' : direction === 'down' ? 'down' : '') + '">' + esc(deltaLabel) + '</span></div>' + periodToggle + '</div>'
    + '<svg class="chartSvg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-hidden style="color:' + color + '">'
    + '<defs><linearGradient id="nwGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity="0.55"/><stop offset="60%" stop-color="currentColor" stop-opacity="0.18"/><stop offset="100%" stop-color="currentColor" stop-opacity="0"/></linearGradient></defs>'
    + '<line class="chartGrid" x1="0" x2="' + W + '" y1="40" y2="40"/><line class="chartGrid" x1="0" x2="' + W + '" y1="100" y2="100"/><line class="chartGrid" x1="0" x2="' + W + '" y1="160" y2="160"/>'
    + '<path d="' + areaD + '" fill="url(#nwGrad)"/><path d="' + lineD + '" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="chartLineStroke"/></svg>'
    + statsRow(history) + '</div>';
}

function donutArcPath(cx, cy, rO, rI, a1, a2) {
  const x1o = cx + rO*Math.cos(a1), y1o = cy + rO*Math.sin(a1), x2o = cx + rO*Math.cos(a2), y2o = cy + rO*Math.sin(a2);
  const x1i = cx + rI*Math.cos(a2), y1i = cy + rI*Math.sin(a2), x2i = cx + rI*Math.cos(a1), y2i = cy + rI*Math.sin(a1);
  const large = a2 - a1 > Math.PI ? 1 : 0;
  return 'M ' + x1o.toFixed(2) + ' ' + y1o.toFixed(2) + ' A ' + rO + ' ' + rO + ' 0 ' + large + ' 1 ' + x2o.toFixed(2) + ' ' + y2o.toFixed(2) + ' L ' + x1i.toFixed(2) + ' ' + y1i.toFixed(2) + ' A ' + rI + ' ' + rI + ' 0 ' + large + ' 0 ' + x2i.toFixed(2) + ' ' + y2i.toFixed(2) + ' Z';
}

function arrivalLabel(iso) {
  if (!iso) return null;
  const isoSafe = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + 'T00:00' : iso;
  const d = new Date(isoSafe); if (isNaN(d.getTime())) return null;
  const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((dayStart.getTime() - today.getTime()) / 86400000);
  const date = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  if (diff < 0) return { label: Math.abs(diff) + 'd late · ' + date, cls: 'past' };
  if (diff === 0) return { label: 'arrives today · ' + date, cls: 'today' };
  if (diff === 1) return { label: 'arrives tomorrow · ' + date, cls: 'imminent' };
  if (diff <= 5) return { label: 'in ' + diff + 'd · ' + date, cls: 'imminent' };
  return { label: 'in ' + diff + 'd · ' + date, cls: '' };
}

/* ============================================================
 * Live stock prices (Finnhub) — called from the holdings card
 * ============================================================ */
async function refreshStockPrices(opts) {
  opts = opts || {};
  const holdings = state.accounts.filter(a => a.type === 'stocks' && a.ticker);
  if (!settings.finnhubKey) { if (!opts.silent) openSettings(); return; }
  if (!holdings.length) { if (!opts.silent) alert('Add a stock holding (with a ticker) first.'); return; }
  ui.pricesBusy = true; if (!opts.silent) render();
  let ok = 0; const failed = [];
  await Promise.all(holdings.map(async a => {
    try {
      const r = await fetch('https://finnhub.io/api/v1/quote?symbol=' + encodeURIComponent(a.ticker) + '&token=' + encodeURIComponent(settings.finnhubKey));
      const j = await r.json();
      const price = Number(j && j.c);
      // Finnhub quotes US-listed symbols in USD; convert USD → CHF (our base).
      if (!price || !isFinite(price)) { failed.push(a.ticker); return; }
      const priceChf = price / (rates.USD || 1);
      a.lastPriceChf = priceChf; a.lastPriceAt = Date.now();
      a.amountCHF = (Number(a.shares) || 0) * priceChf;
      ok++;
    } catch (e) { failed.push(a.ticker); }
  }));
  ui.pricesBusy = false;
  maybeSnapshotNw(); save(); render();
  if (!opts.silent && failed.length) {
    alert('Updated ' + ok + ' holding' + (ok === 1 ? '' : 's') + '. Could not price: ' + failed.join(', ') + '.\n\nFinnhub\'s free tier covers US-listed symbols. Check the ticker and that your key is valid.');
  }
}

 * AI screenshot import (Anthropic) — direct from the browser
 * ============================================================ */
function openSettings() { ui.settingsOpen = true; renderModal(); }
function fileToDataUrl(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); }); }
const IS_DEV = (function () { try { const h = location.hostname; return location.protocol === 'file:' || h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local'); } catch (e) { return false; } })();
const IMAGE_MAX_EDGE = 1024; // cap long edge — the image is ~all of the input cost

function loadImage(src) { return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = () => rej(new Error('That file is not a readable image.')); i.src = src; }); }

// Downscale + re-encode in the browser (the client-side equivalent of a
// server-side `sharp` resize): cap the long edge to ~1024px and re-encode as
// JPEG. A raw phone screenshot is ~4k image tokens; this brings it to ~1k.
async function downscaleImage(file) {
  const img = await loadImage(await fileToDataUrl(file));
  const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  const scale = Math.min(1, IMAGE_MAX_EDGE / Math.max(w, h));
  const tw = Math.max(1, Math.round(w * scale)), th = Math.max(1, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = tw; canvas.height = th;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, tw, th); // flatten alpha (PNG screenshots → JPEG)
  ctx.drawImage(img, 0, 0, tw, th);
  const url = canvas.toDataURL('image/jpeg', 0.8);
  const m = /^data:(image\/[^;]+);base64,(.*)$/.exec(url);
  if (!m) throw new Error('Could not process that image.');
  return { mediaType: m[1], b64: m[2], w: tw, h: th };
}

function ccyOf(v) { const c = String(v || '').toUpperCase(); return CURRENCIES.indexOf(c) >= 0 ? c : 'CHF'; }
function applyImport(kind, items) {
  if (!Array.isArray(items)) return 0;
  let n = 0;
  items.forEach(it => {
    const amt = Number(it && it.a);
    if (!isFinite(amt)) return;
    const ccy = ccyOf(it.c);
    const amountCHF = amt / (rates[ccy] || 1);
    const name = String((it && it.n) || '').trim() || 'Untitled';
    if (kind === 'statement') {
      const type = ['bank', 'stocks', 'crypto', 'other'].indexOf(it.t) >= 0 ? it.t : 'other';
      state.accounts.push({ id: genId('acc'), type, name, amountCHF });
      pushActivity({ accountType: type, name, deltaCHF: amountCHF, kind: 'add' });
      n++;
    } else if (kind === 'subs') {
      const period = ['monthly', 'yearly', 'weekly'].indexOf(it.p) >= 0 ? it.p : 'monthly';
      state.subscriptions.push({ id: genId('sub'), name, amountCHF, period, enteredAmount: amt, enteredCurrency: ccy, renewal: null, fromAccountId: null, autoDeduct: false, lastDeductedAt: null });
      n++;
    } else if (kind === 'receipt') {
      state.orders.push({ id: genId('ord'), name, amountCHF, enteredAmount: amt, enteredCurrency: ccy, fromAccountId: null, date: null, ts: Date.now(), deductedAt: null, pctAtDeduction: null, deductedFromName: null });
      n++;
    }
  });
  if (n) { maybeSnapshotNw(); save(); }
  return n;
}

/* ============================================================
 * runImport — cheapest-possible bank-statement / receipt OCR.
 *
 * Cost optimizations (input image ≫ everything else, so we attack it first):
 *  1. Model: Claude Haiku 4.5 ($1/$5 per 1M) — never Sonnet/Opus for OCR.
 *  2. Downscale the screenshot to ~1024px long edge + re-encode JPEG BEFORE
 *     upload (downscaleImage). ~4k image tokens → ~1k. Biggest single lever.
 *  3. Prompt caching: the instructions + schema + few-shot live in a
 *     cache_control:ephemeral system block, byte-identical every call, shared
 *     across all three import kinds. (Haiku's cache minimum is 4096 tokens, so
 *     this lean block won't actually cache until it grows — harmless, and the
 *     dev log shows cache_read so you can see if/when it engages.)
 *  4. Forced structured output: tool_choice pins the `extract` tool, so the
 *     model must emit one schema-shaped object — no prose. max_tokens 500,
 *     temperature 0 (effort param is NOT sent — it errors on Haiku).
 *  5. Compact JSON: short keys (t,n,a,c,p), optional fields omitted, no nulls —
 *     output tokens are the priciest part.
 *  Robustness: parse the tool_use block; on a malformed/empty result retry
 *  once, then surface { error }. Auth errors (401/403) are not retried.
 *  NOTE: keys are server-side-only in the hosted Rowan app; this is the
 *  standalone, so the call is browser-direct with the user's own key. There is
 *  no route handler / sharp / tier-gate here — those are hosted-app concerns.
 * ============================================================ */
async function callExtract(kind, img) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': settings.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: settings.anthropicModel || DEFAULT_MODEL,
      max_tokens: 500,
      temperature: 0,
      system: [{ type: 'text', text: EXTRACT_SYSTEM, cache_control: { type: 'ephemeral' } }],
      tools: [EXTRACT_TOOL],
      tool_choice: { type: 'tool', name: 'extract' },
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.b64 } },
        { type: 'text', text: KIND_HINT[kind] },
      ] }],
    }),
  });
  const j = await r.json();
  if (j.error) { const e = new Error(j.error.message || ('Anthropic API error (HTTP ' + r.status + ')')); e.status = r.status; throw e; }
  if (IS_DEV) { const u = j.usage || {}; console.log('[finance import] ' + kind + ' ' + img.w + '×' + img.h, { in: u.input_tokens, out: u.output_tokens, cache_write: u.cache_creation_input_tokens, cache_read: u.cache_read_input_tokens }); }
  const block = (j.content || []).find(b => b.type === 'tool_use' && b.name === 'extract');
  if (!block || !block.input || !Array.isArray(block.input.items)) throw new Error('The model did not return the expected structure.');
  return block.input.items;
}
async function runImport(kind, file) {
  if (!settings.anthropicKey || !file) return;
  ui.importBusy = true; ui.importError = null; ui.importResult = null; renderModal();
  try {
    const img = await downscaleImage(file);
    let items = null, lastErr = null;
    for (let attempt = 0; attempt < 2 && items === null; attempt++) {
      try { items = await callExtract(kind, img); }
      catch (e) { lastErr = e; if (e.status === 401 || e.status === 403) break; } // bad key → no retry
    }
    if (items === null) throw lastErr || new Error('Could not read that screenshot.');
    const count = applyImport(kind, items);
    const noun = kind === 'statement' ? (count === 1 ? 'account' : 'accounts') : kind === 'subs' ? (count === 1 ? 'subscription' : 'subscriptions') : (count === 1 ? 'order' : 'orders');
    if (kind === 'statement') state.activeTab = 'net'; else if (kind === 'subs') state.activeTab = 'subs'; else state.activeTab = 'orders';
    ui.importBusy = false; ui.importResult = { count, noun };
    save(); render();
  } catch (err) {
    ui.importBusy = false;
    ui.importError = (err && err.message) || 'Something went wrong. Check your key and try again.';
    renderModal();
  }
}

/* ============================================================
 * Render
 * ============================================================ */
function viewHtml() {
  if (state.activeTab === 'net') return netWorthViewHtml();
  if (state.activeTab === 'subs') return subsViewHtml();
  if (state.activeTab === 'orders') return ordersViewHtml();
  return wishViewHtml();
}
function tabBarHtml() {
  return '<nav class="tabBar" aria-label="Finance sections"><div class="tabBarInner">'
    + TAB_KEYS.map(k => '<button type="button" class="tab ' + (k === state.activeTab ? 'active' : '') + '" data-act="tab" data-tab="' + k + '">' + TAB_LABELS[k] + '</button>').join('')
    + '</div></nav>';
}
function render() {
  document.getElementById('app').innerHTML = headerHtml() + tickerHtml() + viewHtml() + tabBarHtml();
  renderModal();
  mountTicker();
  // Focus an inline-edit input if one just opened.
  if (ui.edit) {
    const el = document.getElementById('edit-' + ui.edit.field + '-' + ui.edit.id);
    if (el) { el.focus(); try { el.select(); } catch {} }
  }
}

/* ============================================================
 * Inline-edit commit helpers
 * ============================================================ */
function commitName(id, val) { actions.renameAccount(id, val); ui.edit = null; }
function commitAmt(id, val) {
  const acct = state.accounts.find(a => a.id === id); ui.edit = null;
  if (!acct) { render(); return; }
  const v = (val || '').trim();
  if (v === '') { render(); return; }
  let nextDisplay = chfToDisplay(acct.amountCHF, state.currency, rates);
  if (/^[+\-]\s*\d/.test(v)) { const delta = parseFloat(v.replace(/\s+/g, '')); if (!isNaN(delta)) nextDisplay += delta; }
  else { const n = parseFloat(v); if (!isNaN(n)) nextDisplay = n; }
  actions.setAccountAmount(id, Math.max(0, nextDisplay));
}
function commitShares(id, val) { const next = parseFloat(val); ui.edit = null; if (!isNaN(next) && next >= 0) actions.setHoldingShares(id, next); else render(); }

/* ============================================================
 * Event wiring
 * ============================================================ */
function getDraftRef(path) { const [a, b] = path.split('.'); return { obj: ui.drafts[a], key: b }; }

document.addEventListener('input', e => {
  const t = e.target;
  if (t.dataset && t.dataset.draft) {
    const { obj, key } = getDraftRef(t.dataset.draft);
    if (obj) {
      if (t.type === 'checkbox') obj[key] = t.checked;
      else obj[key] = t.dataset.upper ? t.value.toUpperCase() : t.value;
    }
    if (t.dataset.orderprev) {
      const prevEl = document.getElementById('orderPreview');
      if (prevEl) { const p = orderPreviewText(netWorthChf(state.accounts)); prevEl.textContent = p.text; prevEl.className = 'addPreview ' + (p.cls === 'warn' ? 'warn' : p.cls === 'bad' ? 'bad' : ''); }
    }
  }
});
document.addEventListener('change', e => {
  const t = e.target;
  if (t.dataset && t.dataset.importfile) { const file = t.files && t.files[0]; if (file) runImport(t.dataset.importfile, file); return; }
  if (t.dataset && t.dataset.draft) { const { obj, key } = getDraftRef(t.dataset.draft); if (obj) obj[key] = (t.type === 'checkbox') ? t.checked : t.value; }
});

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t.dataset && t.dataset.edit) {
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(t); }
    else if (e.key === 'Escape') { ui.edit = null; render(); }
    return;
  }
  if (e.key === 'Enter' && t.dataset && t.dataset.enter) {
    e.preventDefault();
    const container = t.closest('.addCard, .accountCard');
    const submit = container && container.querySelector('[data-act="' + t.dataset.enter + '"]');
    if (submit) submit.click();
  }
});
document.addEventListener('blur', e => {
  const t = e.target;
  if (t.dataset && t.dataset.edit) commitEdit(t);
}, true);

function commitEdit(t) {
  const id = t.dataset.id, field = t.dataset.edit;
  if (!ui.edit) return; // already committed
  if (field === 'name') commitName(id, t.value);
  else if (field === 'amt') commitAmt(id, t.value);
  else if (field === 'shares') commitShares(id, t.value);
}

document.addEventListener('click', e => {
  const stop = e.target.closest('[data-stop]');
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act;
  const id = btn.dataset.id;
  switch (act) {
    case 'back': e.preventDefault(); break;
    case 'currency': actions.setCurrency(btn.dataset.c); break;
    case 'theme': applyTheme(btn.dataset.theme); break;
    case 'tab': actions.setActiveTab(btn.dataset.tab); break;
    case 'chartPeriod': ui.chartPeriod = btn.dataset.p; render(); break;
    case 'showAdd': ui.show[btn.dataset.show] = true; render(); break;
    case 'refreshPrices': refreshStockPrices(); break;
    case 'openSettings': openSettings(); break;
    case 'closeSettings': if (!stop || e.target.closest('.importClose')) { ui.settingsOpen = false; renderModal(); } break;
    case 'saveSettings': {
      const fk = document.getElementById('settings-finnhub');
      const ak = document.getElementById('settings-anthropic');
      const mk = document.getElementById('settings-model');
      settings.finnhubKey = fk ? fk.value.trim() : settings.finnhubKey;
      settings.anthropicKey = ak ? ak.value.trim() : settings.anthropicKey;
      settings.anthropicModel = (mk && mk.value.trim()) || DEFAULT_MODEL;
      saveSettings(); ui.settingsOpen = false; renderModal();
      break;
    }

    case 'editName': ui.edit = { id, field: 'name' }; render(); break;
    case 'editAmt': ui.edit = { id, field: 'amt' }; render(); break;
    case 'editShares': ui.edit = { id, field: 'shares' }; render(); break;
    case 'delAccount': actions.deleteAccount(id); break;

    case 'addAccount': {
      const cat = btn.dataset.cat; const d = ui.drafts[cat];
      const a = parseFloat(d.amt); if (!d.name.trim() || isNaN(a)) break;
      actions.addAccount(cat, d.name, a); d.name = ''; d.amt = '';
      ui.show[cat + 'Add'] = true; render(); break;
    }
    case 'addHolding': {
      const d = ui.drafts.stockHold; const s = parseFloat(d.shares);
      if (!d.ticker.trim() || isNaN(s) || s <= 0) break;
      actions.addHolding(d.ticker, s); d.ticker = ''; d.shares = ''; ui.show.stocksAdd = true; render(); break;
    }
    case 'addStockManual': {
      const d = ui.drafts.stockManual; const a = parseFloat(d.amt);
      if (!d.name.trim() || isNaN(a)) break;
      actions.addAccount('stocks', d.name, a); d.name = ''; d.amt = ''; ui.show.stocksManual = true; render(); break;
    }

    case 'addSub': {
      const d = ui.drafts.subAdd; const a = parseFloat(d.amount);
      if (!d.name.trim() || isNaN(a)) break;
      if (d.auto && !d.from) { alert('Pick a “from account” first. Auto-deduct needs somewhere to take the money from.'); break; }
      actions.addSubscription({ name: d.name, displayAmount: a, period: d.period, renewal: d.renewal || null, fromAccountId: d.from || null, autoDeduct: d.auto });
      ui.drafts.subAdd = { name: '', amount: '', period: 'monthly', renewal: '', from: '', auto: false }; render(); break;
    }
    case 'editSub': {
      const sub = state.subscriptions.find(x => x.id === id); if (!sub) break;
      ui.subEditId = id;
      ui.drafts.subEdit = { name: sub.name, amount: String(sub.enteredAmount != null ? sub.enteredAmount : sub.amountCHF), period: sub.period, renewal: sub.renewal || '', from: sub.fromAccountId || '', auto: sub.autoDeduct };
      render(); break;
    }
    case 'saveSub': {
      const d = ui.drafts.subEdit; const a = parseFloat(d.amount);
      if (!d.name.trim() || isNaN(a)) break;
      if (d.auto && !d.from) { alert('Pick a “from account” first.'); break; }
      actions.updateSubscription(id, { name: d.name.trim(), displayAmount: a, period: d.period, renewal: d.renewal || null, fromAccountId: d.from || null, autoDeduct: d.auto });
      ui.subEditId = null; ui.drafts.subEdit = null; render(); break;
    }
    case 'cancelSub': ui.subEditId = null; ui.drafts.subEdit = null; render(); break;
    case 'delSub': { const sub = state.subscriptions.find(x => x.id === id); if (sub && confirm('Delete "' + sub.name + '"?')) { actions.deleteSubscription(id); ui.subEditId = null; } break; }
    case 'toggleAuto': { const sub = state.subscriptions.find(x => x.id === id); if (sub && !sub.autoDeduct && !sub.fromAccountId) { alert('Pick a “from account” first (use the ✎ edit button).'); break; } actions.toggleSubAutoDeduct(id); break; }

    case 'orderMode': ui.drafts.order.mode = btn.dataset.mode; render(); break;
    case 'addOrder': {
      const d = ui.drafts.order; const isBought = d.mode === 'bought'; const a = parseFloat(d.cost);
      if (!d.name.trim() || isNaN(a)) break; if (isBought && !d.from) break;
      actions.addOrder({ name: d.name, displayAmount: a, fromAccountId: d.from || null, date: isBought ? null : (d.arrival || null), immediate: isBought });
      ui.drafts.order = { mode: d.mode, name: '', cost: '', from: '', arrival: '' }; render(); break;
    }
    case 'deduct': { const o = state.orders.find(x => x.id === id); if (o && !o.fromAccountId) { alert('Set a “from account” to deduct from.'); break; } actions.deductOrder(id); break; }
    case 'undoDeduct': actions.undoDeductOrder(id); break;
    case 'delOrder': actions.deleteOrder(id); break;

    case 'addWish': { const d = ui.drafts.wish; const a = parseFloat(d.amount); if (!d.name.trim() || isNaN(a)) break; actions.addWish(d.name, a); ui.drafts.wish = { name: '', amount: '' }; render(); break; }
    case 'delWish': actions.deleteWish(id); break;

    case 'import': ui.importOpen = btn.dataset.kind; ui.importBusy = false; ui.importError = null; ui.importResult = null; renderModal(); break;
    case 'closeImport': if (!stop || e.target.closest('.importClose')) { ui.importOpen = null; ui.importBusy = false; ui.importError = null; ui.importResult = null; render(); } break;
  }
});

/* ============================================================
 * Boot — snapshot NW, fetch FX rates, render
 * ============================================================ */
maybeSnapshotNw(); save();

fetch('https://open.er-api.com/v6/latest/CHF')
  .then(r => r.json())
  .then(data => {
    if (data && data.rates) {
      rates = { CHF: 1, USD: data.rates.USD || 1, EUR: data.rates.EUR || 1, GBP: data.rates.GBP || 1 };
      render();
      // Now that USD→CHF is known, refresh live holdings prices if a key is set.
      if (settings.finnhubKey && state.accounts.some(a => a.type === 'stocks' && a.ticker)) refreshStockPrices({ silent: true });
    }
  })
  .catch(() => {});

applyTheme(currentTheme);
</script>
